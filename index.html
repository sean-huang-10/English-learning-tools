<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="WordLens" />
  <meta name="theme-color" content="#2c2825" />
  <title>WordLens</title>

  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #faf8f4;
      --surface: #ffffff;
      --ink: #2c2825;
      --ink-muted: #7a7068;
      --accent: #c0622f;
      --accent-light: #f5e6dc;
      --border: #e8e2d8;
      --popup-bg: #2c2825;
      --popup-text: #faf8f4;
      --radius: 14px;
      --shadow: 0 8px 32px rgba(44,40,37,0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--ink);
      color: var(--bg);
      padding: 16px 14px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      font-size: 1.15rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .logo span {
      color: var(--accent);
    }

    .tab-bar {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 3px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tab-bar::-webkit-scrollbar {
      display: none;
    }

    .tab-btn {
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.65);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.72rem;
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }

    .tab-btn.active {
      background: var(--accent);
      color: white;
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 18px;
    }

    .view {
      display: none;
      flex-direction: column;
      gap: 14px;
      animation: viewIn 0.2s ease both;
    }

    .view.active {
      display: flex;
    }

    @keyframes viewIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-title {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .muted {
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--ink-muted);
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .btn-primary,
    .btn-secondary {
      border: none;
      border-radius: var(--radius);
      padding: 13px 18px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--ink-muted);
      border: 1.5px solid var(--border);
    }

    .btn-primary:active,
    .btn-secondary:active,
    .article-card:active,
    .rss-card:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      font-family: 'Lora', serif;
      font-size: 1rem;
      line-height: 1.7;
      background: var(--surface);
      color: var(--ink);
      outline: none;
      resize: vertical;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    input,
    select {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.9rem;
      background: var(--surface);
      color: var(--ink);
      outline: none;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .row > * {
      flex: 1;
    }

    .filter-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 3px;
      scrollbar-width: none;
    }

    .filter-row::-webkit-scrollbar {
      display: none;
    }

    .filter-btn {
      flex-shrink: 0;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 7px 14px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem;
      color: var(--ink-muted);
      cursor: pointer;
      white-space: nowrap;
    }

    .filter-btn.active {
      background: var(--ink);
      border-color: var(--ink);
      color: white;
    }

    .article-card,
    .rss-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      transition: all 0.15s;
    }

    .article-icon,
    .rss-icon {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .article-title,
    .rss-title {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.98rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .article-preview,
    .rss-meta {
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--ink-muted);
      font-size: 0.8rem;
      line-height: 1.5;
    }

    #article-body {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      font-size: 1.08rem;
      line-height: 1.9;
      min-height: 260px;
      white-space: normal;
    }

    .word {
      cursor: pointer;
      border-radius: 4px;
      padding: 1px 2px;
    }

    .word:hover,
    .word.looked-up {
      background: #fdebd8;
      border-bottom: 2px solid var(--accent);
    }

    .word.word-speaking {
      background: var(--accent);
      color: white;
      border-bottom: none;
    }

    .word.word-read {
      color: #b8a898;
    }

    .hint-bar {
      background: var(--accent-light);
      border: 1px solid #e8c4a8;
      border-radius: 10px;
      padding: 10px 14px;
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--accent);
      font-size: 0.86rem;
    }

    .translation-body {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--ink-muted);
      font-size: 0.95rem;
      line-height: 1.9;
      white-space: pre-wrap;
    }

    .vocab-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .vocab-en {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .vocab-zh {
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--ink-muted);
      font-size: 0.9rem;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: #c9beb3;
      font-size: 1rem;
      cursor: pointer;
      padding: 4px 8px;
    }

    #popup-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: none;
      background: rgba(0,0,0,0.05);
    }

    #popup-overlay.active {
      display: block;
    }

    #popup {
      position: absolute;
      width: min(330px, 90vw);
      background: var(--popup-bg);
      color: var(--popup-text);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .popup-header {
      background: rgba(255,255,255,0.08);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .popup-word {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .popup-body {
      padding: 14px 16px;
      font-family: 'Noto Sans TC', sans-serif;
      line-height: 1.7;
    }

    .popup-close,
    .popup-speak {
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      color: white;
      cursor: pointer;
    }

    .popup-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .popup-actions button {
      flex: 1;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-family: 'Noto Sans TC', sans-serif;
      color: white;
      background: var(--accent);
      cursor: pointer;
    }

    .popup-actions button:last-child {
      background: #4a7c59;
    }

    .empty {
      text-align: center;
      padding: 44px 12px;
      color: var(--ink-muted);
      font-family: 'Noto Sans TC', sans-serif;
      line-height: 1.8;
    }

    details summary {
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--ink-muted);
      cursor: pointer;
      padding: 12px 0;
    }

    .loading {
      text-align: center;
      padding: 24px;
      color: var(--ink-muted);
      font-family: 'Noto Sans TC', sans-serif;
    }

    @media (max-width: 560px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .tab-bar {
        width: 100%;
      }

      main {
        padding: 14px;
      }

      .row {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">Word<span>Lens</span></div>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="explore">探索</button>
      <button class="tab-btn" data-tab="read">閱讀</button>
      <button class="tab-btn" data-tab="vocab">單字本</button>
      <button class="tab-btn" data-tab="library">單字庫</button>
      <button class="tab-btn" data-tab="chat">對話</button>
    </div>
  </header>

  <main>
    <section id="explore-view" class="view active">
      <div class="section-title">
        <span>📰 VOA Learning English</span>
        <button class="btn-secondary" id="rss-refresh-btn" style="padding:7px 12px;flex:0;">↺ 載入</button>
      </div>

      <div class="filter-row" id="rss-source-filter">
        <button class="filter-btn active" data-feed="https://learningenglish.voanews.com/api/zmmpql-vomx-tpey-_q">健康生活</button>
        <button class="filter-btn" data-feed="https://learningenglish.voanews.com/api/zmg_pl-vomx-tpeymtm">科技</button>
        <button class="filter-btn" data-feed="https://learningenglish.voanews.com/api/zpyp_l-vomx-tpe_rym">文化</button>
        <button class="filter-btn" data-feed="https://learningenglish.voanews.com/api/zkm-ql-vomx-tpej-rqi">雜誌</button>
        <button class="filter-btn" data-feed="https://learningenglish.voanews.com/api/zmypyl-vomx-tpeyry_">英語學習</button>
      </div>

      <div id="rss-articles"></div>

      <div class="card" style="display:flex;flex-direction:column;gap:12px;">
        <div class="section-title">✨ 用 AI 生成文章</div>
        <div class="row">
          <select id="gen-level">
            <option value="A1">A1 入門</option>
            <option value="A2">A2 基礎</option>
            <option value="B1" selected>B1 中級</option>
            <option value="B2">B2 中高級</option>
            <option value="C1">C1 高級</option>
          </select>
          <select id="gen-topic">
            <option value="World News">🌍 世界新聞</option>
            <option value="Business">💹 商業財經</option>
            <option value="Health">🏥 健康醫療</option>
            <option value="Lifestyle">✨ 生活風格</option>
            <option value="Tech News">📱 科技新知</option>
            <option value="Science">🔬 科學</option>
            <option value="Culture">🎭 文化</option>
            <option value="Travel">✈️ 旅遊</option>
            <option value="Food">🍜 飲食</option>
            <option value="Nature">🌿 自然</option>
            <option value="History">🏛️ 歷史</option>
            <option value="Sports">⚽ 運動</option>
          </select>
        </div>

        <div class="row" id="api-key-row">
          <input type="password" id="api-key-input" placeholder="輸入 Gemini API Key，AIza 開頭" autocomplete="off" />
          <button class="btn-secondary" id="api-key-save">儲存</button>
        </div>
        <div class="muted" id="api-key-status"></div>
        <button class="btn-primary" id="gen-btn">生成文章</button>
      </div>

      <details class="card">
        <summary>📋 貼上自己的文章</summary>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <textarea id="article-input" placeholder="Paste your English article here..."></textarea>
          <button class="btn-primary" id="start-btn">📖 開始閱讀</button>
        </div>
      </details>

      <div class="section-title">📚 內建文章</div>
      <div id="article-list"></div>
    </section>

    <section id="read-view" class="view">
      <div class="row">
        <button class="btn-secondary" id="back-btn">← 返回探索</button>
        <div class="muted" id="word-count" style="text-align:right;"></div>
      </div>

      <div class="hint-bar">👆 點任何英文單字查看翻譯</div>

      <div class="row">
        <button class="btn-secondary" id="read-aloud-btn">🔊 朗讀全文</button>
        <select id="speech-rate">
          <option value="0.6">0.6x</option>
          <option value="0.8">0.8x</option>
          <option value="0.9" selected>0.9x</option>
          <option value="1.0">1.0x</option>
          <option value="1.2">1.2x</option>
          <option value="1.5">1.5x</option>
        </select>
      </div>

      <div id="article-body"></div>

      <button class="btn-secondary" id="translate-all-btn">🌐 顯示全文翻譯</button>
      <div id="translation-section" style="display:none;">
        <div class="translation-body" id="translation-body"></div>
      </div>
    </section>

    <section id="vocab-view" class="view">
      <div class="section-title">📘 單字本</div>
      <div class="muted" id="vocab-count"></div>
      <div id="vocab-list"></div>
    </section>

    <section id="library-view" class="view">
      <div class="section-title">📗 單字庫</div>
      <div class="muted" id="library-count"></div>
      <div class="row">
        <button class="btn-secondary" id="export-btn">⬇ 匯出備份</button>
        <label class="btn-secondary" style="text-align:center;">
          ⬆ 匯入還原
          <input type="file" id="import-input" accept=".json" style="display:none;" />
        </label>
      </div>
      <div id="library-list"></div>
    </section>

    <section id="chat-view" class="view">
      <div class="card">
        <div class="section-title">💬 英文對話練習</div>
        <p class="muted" style="margin-top:8px;">此功能需要 Gemini API Key。輸入英文後，AI 會用英文回覆。</p>
      </div>
      <div id="chat-messages" class="card" style="min-height:280px;display:flex;flex-direction:column;gap:10px;"></div>
      <div class="row">
        <textarea id="chat-input" placeholder="Type your message in English..." style="min-height:60px;"></textarea>
        <button class="btn-primary" id="chat-send-btn">送出</button>
      </div>
    </section>
  </main>

  <div id="popup-overlay">
    <div id="popup">
      <div class="popup-header">
        <div class="popup-word" id="popup-word"></div>
        <div style="display:flex;gap:8px;">
          <button class="popup-speak" id="popup-speak">🔊</button>
          <button class="popup-close" id="popup-close">✕</button>
        </div>
      </div>
      <div class="popup-body">
        <div id="popup-translation">翻譯中...</div>
        <div class="muted" id="popup-phonetic" style="margin-top:6px;color:rgba(255,255,255,0.55);"></div>
        <div class="popup-actions">
          <button id="popup-save">＋ 單字本</button>
          <button id="popup-lib-save">＋ 單字庫</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let vocab = JSON.parse(localStorage.getItem('wordlens-vocab') || '[]');
    let library = JSON.parse(localStorage.getItem('wordlens-library') || '[]');
    let translationCache = {};
    let dictCache = {};
    let currentWord = '';
    let currentTranslation = '';
    let currentWordEl = null;
    let currentArticleText = '';
    let isReading = false;
    let currentUtterance = null;

    const views = {
      explore: document.getElementById('explore-view'),
      read: document.getElementById('read-view'),
      vocab: document.getElementById('vocab-view'),
      library: document.getElementById('library-view'),
      chat: document.getElementById('chat-view')
    };

    const tabs = document.querySelectorAll('.tab-btn');

    const SEED_ARTICLES = [
      {
        id: 's1',
        level: 'A1',
        topic: 'Food',
        icon: '🍎',
        titleZh: '每天一個蘋果',
        title: 'An Apple a Day',
        content: 'Apples are one of the most popular fruits in the world. They come in many colors, like red, green, and yellow. People eat apples every day because they are healthy. Apples have vitamins that help your body stay strong. You can eat an apple in the morning for breakfast, or as a snack in the afternoon. Some people like to make apple juice or apple pie.'
      },
      {
        id: 's2',
        level: 'A2',
        topic: 'Nature',
        icon: '🐝',
        titleZh: '神奇的蜜蜂',
        title: 'The Amazing Honey Bee',
        content: 'Honey bees are small insects, but they do very important work. Bees fly from flower to flower to collect nectar. They use this nectar to make honey in their hive. Bees also help plants grow by carrying pollen between flowers. Without bees, many fruits and vegetables would not exist.'
      },
      {
        id: 's3',
        level: 'B1',
        topic: 'Science',
        icon: '😴',
        titleZh: '睡眠的力量',
        title: 'The Power of Sleep',
        content: 'Sleep is one of the most essential activities for human health, yet many people treat it as optional. During sleep, the brain processes memories from the day, consolidating important information and discarding irrelevant details. The body also uses this time to repair tissue, build muscle, and strengthen the immune system.'
      },
      {
        id: 's4',
        level: 'B1',
        topic: 'Travel',
        icon: '✈️',
        titleZh: '我最喜歡的城市',
        title: 'My Favourite City',
        content: 'I love visiting cities. My favourite city is Tokyo in Japan. Tokyo is very big and very clean. There are many trains in Tokyo. You can go everywhere by train. The food in Tokyo is delicious. I like to eat sushi and ramen. Tokyo also has many interesting shops and parks.'
      }
    ];

    let storedArticles = JSON.parse(localStorage.getItem('wordlens-articles') || '[]');
    let allArticles = [...storedArticles, ...SEED_ARTICLES];

    function switchTab(tab) {
      tabs.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
      Object.entries(views).forEach(([name, view]) => {
        view.classList.toggle('active', name === tab);
      });

      if (tab !== 'read') stopReadAloud();
      if (tab === 'explore') renderExplore();
      if (tab === 'vocab') renderVocab();
      if (tab === 'library') renderLibrary();
    }

    tabs.forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    document.getElementById('back-btn').addEventListener('click', () => {
      switchTab('explore');
    });

    function renderExplore() {
      const list = document.getElementById('article-list');
      list.innerHTML = allArticles.map(article => {
        return `
          <div class="article-card" data-id="${article.id}">
            <div class="article-icon">${article.icon || '📄'}</div>
            <div>
              <div class="article-title">${article.titleZh} <span class="muted">(${article.level || 'B1'})</span></div>
              <div class="article-preview">${article.content.slice(0, 95)}...</div>
            </div>
          </div>
        `;
      }).join('');

      list.querySelectorAll('.article-card').forEach(card => {
        card.addEventListener('click', () => {
          const article = allArticles.find(item => item.id === card.dataset.id);
          loadArticle(article);
        });
      });
    }

    function loadArticle(article) {
      renderArticle(article.content);
      document.getElementById('word-count').textContent = `${article.title}　${article.level || ''}`;
      switchTab('read');
    }

    function renderArticle(text) {
      currentArticleText = text;

      const body = document.getElementById('article-body');
      const parts = text.split(/(\s+|[\n\r]+)/);
      let html = '';
      let wordCount = 0;
      let charPos = 0;

      parts.forEach(part => {
        if (/\n/.test(part)) {
          html += '<br><br>';
          charPos += part.length;
          return;
        }

        if (/^\s+$/.test(part)) {
          html += ' ';
          charPos += part.length;
          return;
        }

        const clean = part.replace(/[^a-zA-Z'-]/g, '');
        const prefix = part.match(/^[^a-zA-Z'-]*/)?.[0] || '';
        const suffix = part.match(/[^a-zA-Z'-]*$/)?.[0] || '';

        if (clean) {
          wordCount++;
          const wordStart = charPos + prefix.length;
          const saved = vocab.some(item => item.en.toLowerCase() === clean.toLowerCase());
          html += `${prefix}<span class="word ${saved ? 'looked-up' : ''}" data-word="${clean}" data-start="${wordStart}">${clean}</span>${suffix}`;
        } else {
          html += part;
        }

        charPos += part.length;
      });

      body.innerHTML = html;
      document.getElementById('word-count').textContent = `${wordCount} 個單字`;
      document.getElementById('translation-section').style.display = 'none';
      document.getElementById('translation-body').textContent = '';
      document.getElementById('translate-all-btn').textContent = '🌐 顯示全文翻譯';

      body.querySelectorAll('.word').forEach(wordEl => {
        wordEl.addEventListener('click', event => {
          event.stopPropagation();
          showPopup(wordEl.dataset.word, wordEl);
        });
      });
    }

    document.getElementById('start-btn').addEventListener('click', () => {
      const text = document.getElementById('article-input').value.trim();
      if (!text) {
        alert('請先貼上文章');
        return;
      }

      renderArticle(text);
      switchTab('read');
    });

    async function translateText(text) {
      const key = text.toLowerCase();
      if (translationCache[key]) return translationCache[key];

      try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q=${encodeURIComponent(text)}`;
        const res = await fetch(url);
        const data = await res.json();
        const result = data?.[0]?.map(item => item[0]).join('') || '翻譯失敗';
        translationCache[key] = result;
        return result;
      } catch (error) {
        return '翻譯失敗，請確認網路連線';
      }
    }

    async function fetchDictionary(word) {
      const key = word.toLowerCase();
      if (dictCache[key]) return dictCache[key];

      try {
        const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(key)}`);
        if (!res.ok) return null;

        const data = await res.json();
        const entry = data[0];
        const result = {
          phonetic: entry.phonetic || entry.phonetics?.find(item => item.text)?.text || ''
        };

        dictCache[key] = result;
        return result;
      } catch (error) {
        return null;
      }
    }

    async function showPopup(word, el) {
      currentWord = word;
      currentWordEl = el;
      currentTranslation = '';

      document.getElementById('popup-word').textContent = word;
      document.getElementById('popup-translation').textContent = '翻譯中...';
      document.getElementById('popup-phonetic').textContent = '';

      const overlay = document.getElementById('popup-overlay');
      const popup = document.getElementById('popup');
      const rect = el.getBoundingClientRect();
      const margin = 12;

      let left = rect.left;
      let top = rect.bottom + margin;

      if (left + 330 > window.innerWidth) left = window.innerWidth - 330 - margin;
      if (left < margin) left = margin;
      if (top + 220 > window.innerHeight) top = rect.top - 220 - margin;

      popup.style.left = left + 'px';
      popup.style.top = Math.max(margin, top) + 'px';
      overlay.classList.add('active');

      const [translation, dict] = await Promise.all([
        translateText(word),
        fetchDictionary(word)
      ]);

      currentTranslation = translation;
      document.getElementById('popup-translation').textContent = translation;
      document.getElementById('popup-phonetic').textContent = dict?.phonetic || '';

      const inVocab = vocab.some(item => item.en.toLowerCase() === word.toLowerCase());
      const inLibrary = library.some(item => item.en.toLowerCase() === word.toLowerCase());

      document.getElementById('popup-save').textContent = inVocab ? '✓ 已在單字本' : '＋ 單字本';
      document.getElementById('popup-lib-save').textContent = inLibrary ? '✓ 已在單字庫' : '＋ 單字庫';
    }

    function hidePopup() {
      document.getElementById('popup-overlay').classList.remove('active');
    }

    document.getElementById('popup-overlay').addEventListener('click', hidePopup);
    document.getElementById('popup').addEventListener('click', event => event.stopPropagation());
    document.getElementById('popup-close').addEventListener('click', hidePopup);

    document.getElementById('popup-speak').addEventListener('click', () => {
      speakText(currentWord);
    });

    document.getElementById('popup-save').addEventListener('click', () => {
      if (!currentWord || !currentTranslation) return;

      const exists = vocab.some(item => item.en.toLowerCase() === currentWord.toLowerCase());
      if (!exists) {
        vocab.unshift({ en: currentWord, zh: currentTranslation });
        localStorage.setItem('wordlens-vocab', JSON.stringify(vocab));
        currentWordEl?.classList.add('looked-up');
      }

      document.getElementById('popup-save').textContent = '✓ 已在單字本';
    });

    document.getElementById('popup-lib-save').addEventListener('click', () => {
      if (!currentWord || !currentTranslation) return;

      const exists = library.some(item => item.en.toLowerCase() === currentWord.toLowerCase());
      if (!exists) {
        library.unshift({ en: currentWord, zh: currentTranslation });
        localStorage.setItem('wordlens-library', JSON.stringify(library));
      }

      document.getElementById('popup-lib-save').textContent = '✓ 已在單字庫';
    });

    function renderVocab() {
      const list = document.getElementById('vocab-list');
      const count = document.getElementById('vocab-count');

      if (vocab.length === 0) {
        count.textContent = '';
        list.innerHTML = '<div class="empty">單字本是空的<br>閱讀時點單字並儲存</div>';
        return;
      }

      count.textContent = `已收錄 ${vocab.length} 個單字`;
      list.innerHTML = vocab.map((item, index) => `
        <div class="vocab-card">
          <div>
            <div class="vocab-en">${item.en}</div>
            <div class="vocab-zh">${item.zh}</div>
          </div>
          <button class="delete-btn" data-index="${index}">✕</button>
        </div>
      `).join('');

      list.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          vocab.splice(Number(btn.dataset.index), 1);
          localStorage.setItem('wordlens-vocab', JSON.stringify(vocab));
          renderVocab();
        });
      });
    }

    function renderLibrary() {
      const list = document.getElementById('library-list');
      const count = document.getElementById('library-count');

      if (library.length === 0) {
        count.textContent = '';
        list.innerHTML = '<div class="empty">單字庫是空的<br>可從閱讀彈窗加入單字庫</div>';
        return;
      }

      count.textContent = `單字庫共 ${library.length} 個單字`;
      list.innerHTML = library.map((item, index) => `
        <div class="vocab-card">
          <div>
            <div class="vocab-en">${item.en}</div>
            <div class="vocab-zh">${item.zh}</div>
          </div>
          <button class="delete-btn" data-index="${index}">✕</button>
        </div>
      `).join('');

      list.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          library.splice(Number(btn.dataset.index), 1);
          localStorage.setItem('wordlens-library', JSON.stringify(library));
          renderLibrary();
        });
      });
    }

    document.getElementById('export-btn').addEventListener('click', () => {
      const data = {
        version: 1,
        exportedAt: new Date().toISOString(),
        vocab,
        library
      };

      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'wordlens-backup.json';
      link.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById('import-input').addEventListener('change', event => {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = JSON.parse(e.target.result);

          if (Array.isArray(data.vocab)) {
            vocab = data.vocab;
            localStorage.setItem('wordlens-vocab', JSON.stringify(vocab));
          }

          if (Array.isArray(data.library)) {
            library = data.library;
            localStorage.setItem('wordlens-library', JSON.stringify(library));
          }

          renderLibrary();
          alert('匯入成功');
        } catch (error) {
          alert('檔案格式錯誤');
        }
      };

      reader.readAsText(file);
      event.target.value = '';
    });

    function speakText(text) {
      if (!window.speechSynthesis) {
        alert('你的瀏覽器不支援語音功能');
        return;
      }

      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.rate = Number(document.getElementById('speech-rate').value || 0.9);

      window.speechSynthesis.speak(utterance);
    }

    function stopReadAloud() {
      window.speechSynthesis?.cancel();
      isReading = false;
      currentUtterance = null;

      document.getElementById('read-aloud-btn').textContent = '🔊 朗讀全文';
      document.querySelectorAll('.word-speaking, .word-read').forEach(el => {
        el.classList.remove('word-speaking', 'word-read');
      });
    }

    function highlightWordAt(charIndex) {
      const words = Array.from(document.querySelectorAll('#article-body .word[data-start]'));
      let activeWord = null;

      words.forEach(word => {
        const start = Number(word.dataset.start);
        if (start <= charIndex) activeWord = word;
      });

      words.forEach(word => {
        word.classList.remove('word-speaking');
        if (activeWord && Number(word.dataset.start) < Number(activeWord.dataset.start)) {
          word.classList.add('word-read');
        }
      });

      if (activeWord) {
        activeWord.classList.add('word-speaking');
        activeWord.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    document.getElementById('read-aloud-btn').addEventListener('click', () => {
      if (isReading) {
        stopReadAloud();
        return;
      }

      const text = document.getElementById('article-body').innerText.trim();
      if (!text) return;

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.rate = Number(document.getElementById('speech-rate').value || 0.9);

      utterance.onboundary = event => {
        if (event.name === 'word') highlightWordAt(event.charIndex);
      };

      utterance.onend = stopReadAloud;
      utterance.onerror = stopReadAloud;

      currentUtterance = utterance;
      isReading = true;
      document.getElementById('read-aloud-btn').textContent = '⏹ 停止朗讀';
      window.speechSynthesis.speak(utterance);
    });

    document.getElementById('translate-all-btn').addEventListener('click', async () => {
      const section = document.getElementById('translation-section');
      const body = document.getElementById('translation-body');
      const btn = document.getElementById('translate-all-btn');

      if (section.style.display !== 'none') {
        section.style.display = 'none';
        btn.textContent = '🌐 顯示全文翻譯';
        return;
      }

      section.style.display = 'block';
      body.textContent = '翻譯中...';
      btn.textContent = '🌐 隱藏全文翻譯';

      const text = document.getElementById('article-body').innerText.trim();
      const result = await translateText(text);
      body.textContent = result;
    });

    let geminiKey = localStorage.getItem('wordlens-gemini-key') || '';

    function updateApiKeyUI() {
      const row = document.getElementById('api-key-row');
      const status = document.getElementById('api-key-status');

      if (geminiKey) {
        row.style.display = 'none';
        status.innerHTML = '✓ API Key 已儲存　<span id="clear-key" style="text-decoration:underline;cursor:pointer;">清除</span>';
        document.getElementById('clear-key').addEventListener('click', () => {
          geminiKey = '';
          localStorage.removeItem('wordlens-gemini-key');
          updateApiKeyUI();
        });
      } else {
        row.style.display = 'flex';
        status.textContent = '請先到 Google AI Studio 建立 Gemini API Key。';
      }
    }

    document.getElementById('api-key-save').addEventListener('click', () => {
      const value = document.getElementById('api-key-input').value.trim();

      if (!value.startsWith('AIza')) {
        alert('Gemini API Key 通常是 AIza 開頭');
        return;
      }

      geminiKey = value;
      localStorage.setItem('wordlens-gemini-key', value);
      updateApiKeyUI();
    });

    document.getElementById('gen-btn').addEventListener('click', async () => {
      if (!geminiKey) {
        alert('請先輸入 Gemini API Key');
        return;
      }

      const level = document.getElementById('gen-level').value;
      const topic = document.getElementById('gen-topic').value;
      const btn = document.getElementById('gen-btn');

      btn.disabled = true;
      btn.textContent = '生成中...';

      try {
        const levelDesc = {
          A1: 'very simple English, under 120 words',
          A2: 'simple English, 150 words',
          B1: 'intermediate English, 220 words',
          B2: 'upper-intermediate English, 320 words',
          C1: 'advanced English, 420 words'
        };

        const prompt = `Write an English graded reading article about "${topic}" at ${levelDesc[level]}. Return only valid JSON: {"title":"English title","titleZh":"中文標題","content":"article content"}.`;

        const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-goog-api-key': geminiKey
          },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.8, maxOutputTokens: 1200 }
          })
        });

        const data = await res.json();
        if (data.error) throw new Error(data.error.message);

        const raw = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
        const parsed = JSON.parse(raw);

        const article = {
          id: 'gen_' + Date.now(),
          level,
          topic,
          icon: '✨',
          title: parsed.title,
          titleZh: parsed.titleZh,
          content: parsed.content
        };

        storedArticles.unshift(article);
        allArticles = [...storedArticles, ...SEED_ARTICLES];
        localStorage.setItem('wordlens-articles', JSON.stringify(storedArticles));
        renderExplore();
        loadArticle(article);
      } catch (error) {
        alert('生成失敗：' + error.message);
      }

      btn.disabled = false;
      btn.textContent = '生成文章';
    });

    const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';
    const CORS_PROXY = 'https://corsproxy.io/?';
    let activeRssFeed = document.querySelector('#rss-source-filter .filter-btn.active').dataset.feed;

    document.querySelectorAll('#rss-source-filter .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#rss-source-filter .filter-btn').forEach(item => item.classList.remove('active'));
        btn.classList.add('active');
        activeRssFeed = btn.dataset.feed;
        loadRssFeed();
      });
    });

    document.getElementById('rss-refresh-btn').addEventListener('click', loadRssFeed);

    async function loadRssFeed() {
      const container = document.getElementById('rss-articles');
      const btn = document.getElementById('rss-refresh-btn');

      btn.textContent = '載入中...';
      container.innerHTML = '<div class="loading">載入 VOA 文章中...</div>';

      try {
        const res = await fetch(RSS2JSON + encodeURIComponent(activeRssFeed) + '&count=8');
        const data = await res.json();

        if (data.status !== 'ok') throw new Error(data.message || 'RSS 載入失敗');

        const items = (data.items || []).map(item => ({
          title: item.title || '',
          link: item.link || '',
          date: item.pubDate || '',
          desc: (item.content || item.description || '').replace(/<[^>]*>/g, '').trim()
        }));

        renderRssItems(items);
      } catch (error) {
        container.innerHTML = '<div class="loading">載入失敗，可能是 RSS 或 CORS 限制。可以使用「貼上自己的文章」功能。</div>';
      }

      btn.textContent = '↺ 載入';
    }

    function renderRssItems(items) {
      const container = document.getElementById('rss-articles');

      if (items.length === 0) {
        container.innerHTML = '<div class="loading">沒有文章</div>';
        return;
      }

      container.innerHTML = items.map((item, index) => `
        <div class="rss-card" data-index="${index}">
          <div class="rss-icon">📡</div>
          <div>
            <div class="rss-title">${item.title}</div>
            <div class="rss-meta">${item.date ? new Date(item.date).toLocaleDateString('zh-TW') : 'VOA Learning English'}</div>
          </div>
        </div>
      `).join('');

      container.querySelectorAll('.rss-card').forEach(card => {
        card.addEventListener('click', () => openRssArticle(items[Number(card.dataset.index)]));
      });
    }

    async function openRssArticle(item) {
      switchTab('read');
      document.getElementById('article-body').innerHTML = '<div class="loading">正在載入文章...</div>';
      document.getElementById('word-count').textContent = 'VOA Learning English';

      try {
        const res = await fetch(CORS_PROXY + encodeURIComponent(item.link), {
          signal: AbortSignal.timeout(7000)
        });

        const raw = await res.text();
        const doc = new DOMParser().parseFromString(raw, 'text/html');
        const paragraphs = Array.from(doc.querySelectorAll('article p, .wsw p, .article-content p, p'))
          .map(p => p.textContent.trim())
          .filter(text => text.length > 45);

        let text = paragraphs.join('\n\n');

        if (text.length < 100) text = item.desc;

        if (!text || text.length < 50) {
          throw new Error('文章內容不足');
        }

        renderArticle(text);
        document.getElementById('word-count').textContent = item.title.slice(0, 28) + (item.title.length > 28 ? '...' : '') + '　B1';
      } catch (error) {
        if (item.desc && item.desc.length > 50) {
          renderArticle(item.desc);
        } else {
          document.getElementById('article-body').innerHTML = '<div class="loading">無法取得全文，請改用貼上文章功能。</div>';
        }
      }
    }

    document.getElementById('chat-send-btn').addEventListener('click', sendChatMessage);

    async function sendChatMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      const messages = document.getElementById('chat-messages');

      if (!text) return;

      messages.innerHTML += `<div class="card" style="align-self:flex-end;background:#f5e6dc;">${escapeHtml(text)}</div>`;
      input.value = '';

      if (!geminiKey) {
        messages.innerHTML += `<div class="card">請先在探索頁設定 Gemini API Key。</div>`;
        return;
      }

      messages.innerHTML += `<div class="card" id="chat-loading">回覆中...</div>`;

      try {
        const prompt = `You are an English practice partner. Reply in simple English and correct the user's sentence gently if needed. User says: ${text}`;

        const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-goog-api-key': geminiKey
          },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.8, maxOutputTokens: 300 }
          })
        });

        const data = await res.json();
        if (data.error) throw new Error(data.error.message);

        const reply = data.candidates[0].content.parts[0].text.trim();
        document.getElementById('chat-loading').remove();
        messages.innerHTML += `<div class="card">${escapeHtml(reply)}</div>`;
      } catch (error) {
        document.getElementById('chat-loading')?.remove();
        messages.innerHTML += `<div class="card">連線失敗：${escapeHtml(error.message)}</div>`;
      }

      messages.scrollTop = messages.scrollHeight;
    }

    function escapeHtml(text) {
      return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    renderExplore();
    renderVocab();
    renderLibrary();
    updateApiKeyUI();
    loadRssFeed();
  </script>
</body>
</html>

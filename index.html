<!DOCTYPE html>

<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="WordLens" />
  <meta name="theme-color" content="#2c2825" />
  <link rel="manifest" href="manifest.json" />
  <title>WordLens</title>

  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #faf8f4;
      --surface: #ffffff;
      --ink: #2c2825;
      --ink-muted: #7a7068;
      --accent: #c0622f;
      --accent-light: #f5e6dc;
      --border: #e8e2d8;
      --word-hover: #fdebd8;
      --popup-bg: #2c2825;
      --popup-text: #faf8f4;
      --radius: 14px;
      --shadow: 0 8px 32px rgba(44,40,37,0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--ink);
      color: var(--bg);
      padding: 16px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .logo {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .logo span { color: var(--accent); }
    .tab-bar {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 3px;
    }
    .tab-btn {
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.72rem;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: white;
    }

    /* ── Main ── */
    main { flex: 1; padding: 20px; max-width: 700px; margin: 0 auto; width: 100%; }

    /* ── Input View ── */
    #input-view { display: flex; flex-direction: column; gap: 16px; }

    .input-label {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.8rem;
      color: var(--ink-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      font-family: 'Lora', serif;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--ink);
      background: var(--surface);
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--ink-muted); font-style: italic; }

    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 15px 24px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary:active { opacity: 0.85; transform: scale(0.98); }

    .sample-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 20px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.88rem;
      color: var(--ink-muted);
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .sample-btn:active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

    /* ── Read View ── */
    #read-view { display: none; flex-direction: column; gap: 16px; }

    .article-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .word-count {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.78rem;
      color: var(--ink-muted);
    }
    .back-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem;
      color: var(--ink-muted);
      cursor: pointer;
    }
    .back-btn:active { background: var(--border); }

    .speed-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
    }
    .speed-label {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem;
      color: var(--ink-muted);
      white-space: nowrap;
    }
    .speed-slider-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }
    .speed-value {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      min-width: 36px;
      text-align: right;
    }
    .custom-slider {
      flex: 1;
      padding: 10px 0;
      cursor: pointer;
      touch-action: none;
    }
    .custom-track {
      position: relative;
      height: 4px;
      background: #e8e2d8;
      border-radius: 2px;
    }
    .custom-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: #c0622f;
      border-radius: 2px;
      width: 56%;
      pointer-events: none;
    }
    .custom-thumb {
      position: absolute;
      top: 50%;
      left: 56%;
      transform: translate(-50%, -50%);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #c0622f;
      box-shadow: 0 2px 8px rgba(192,98,47,0.4);
      pointer-events: none;
    }
    .custom-thumb.dragging { transform: translate(-50%, -50%) scale(1.2); }

    .read-aloud-row {
      display: flex;
      gap: 8px;
    }
    .read-aloud-btn {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 18px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .read-aloud-main { flex: 1; }
    .read-aloud-pause {
      width: 52px;
      flex-shrink: 0;
      font-size: 1.1rem;
    }
    .read-aloud-btn:active { opacity: 0.8; }
    .read-aloud-btn.playing {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
    }
    .read-aloud-btn.paused {
      background: #eef3ff;
      border-color: #7b9cde;
      color: #3a5fa8;
    }
    .read-aloud-btn.playing #read-aloud-icon {
      animation: pulse-speak 0.55s ease-in-out infinite alternate;
      display: inline-block;
    }
    @keyframes icon-pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.2); }
    }

    .hint-bar {
      background: var(--accent-light);
      border: 1px solid #e8c4a8;
      border-radius: 10px;
      padding: 10px 14px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #article-body {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 20px;
      font-size: 1.05rem;
      line-height: 1.85;
      color: var(--ink);
      min-height: 300px;
    }

    .word {
      display: inline;
      cursor: pointer;
      border-radius: 4px;
      padding: 1px 2px;
      transition: background 0.12s, color 0.12s;
      position: relative;
    }
    .word:hover { background: var(--word-hover); }
    .word:active { background: #f8d5b8; transform: scale(0.97); }
    .word.loading { background: var(--accent-light); }
    .word.looked-up {
      background: #fef0e6;
      border-bottom: 2px solid var(--accent);
      border-radius: 4px 4px 2px 2px;
    }
    .word.looked-up:hover { background: #fde3cc; }
    .word.word-read {
      color: #b8a898;
      transition: color 0.2s;
    }
    .word.word-speaking {
      background: #c0622f;
      color: white !important;
      border-radius: 4px;
      padding: 1px 3px;
      box-shadow: 0 2px 8px rgba(192,98,47,0.4);
      transition: background 0.1s, color 0.1s;
    }

    /* ── Vocab List ── */
    #vocab-view { display: none; flex-direction: column; gap: 12px; }

    .vocab-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-muted);
      font-style: italic;
    }
    .vocab-count {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.8rem;
      color: var(--ink-muted);
    }
    .vocab-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .vocab-en {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .vocab-zh {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.9rem;
      color: var(--ink-muted);
    }
    .vocab-del {
      background: none;
      border: none;
      color: var(--border);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .vocab-del:active { background: #fde8e8; color: #c0392b; }

    /* ── Popup ── */
    #popup-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      pointer-events: none;
    }
    #popup-overlay.active { pointer-events: all; }

    #popup {
      position: absolute;
      background: var(--popup-bg);
      color: var(--popup-text);
      border-radius: 16px;
      padding: 0;
      width: min(320px, 88vw);
      box-shadow: var(--shadow);
      transform: scale(0.85) translateY(8px);
      opacity: 0;
      transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      overflow: hidden;
    }
    #popup.show {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    .popup-header {
      background: rgba(255,255,255,0.08);
      padding: 14px 18px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .popup-word {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .popup-close {
      background: rgba(255,255,255,0.12);
      border: none;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .popup-speak-btn {
      background: rgba(255,255,255,0.12);
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
    }
    .popup-speak-btn:active { background: rgba(255,255,255,0.28); transform: scale(0.88); }
    .popup-speak-btn.speaking { animation: pulse-speak 0.55s ease-in-out infinite alternate; }
    @keyframes pulse-speak {
      from { background: rgba(192,98,47,0.35); }
      to   { background: rgba(192,98,47,0.75); }
    }

    .popup-body { padding: 14px 18px; }

    .popup-translation {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 1.05rem;
      color: #f0ece6;
      margin-bottom: 14px;
      min-height: 24px;
    }
    .popup-translation.loading-text::after {
      content: '';
      display: inline-block;
      width: 60px;
      height: 14px;
      background: linear-gradient(90deg, rgba(255,255,255,0.1) 25%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.1) 75%);
      background-size: 200% 100%;
      animation: shimmer 1s infinite;
      border-radius: 4px;
      vertical-align: middle;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .popup-actions {
      display: flex;
      gap: 8px;
    }
    .popup-save-btn {
      flex: 1;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .popup-save-btn:active { opacity: 0.8; }
    .popup-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
      min-height: 0;
    }
    .pos-badge {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
      letter-spacing: 0.03em;
    }
    .pos-noun     { background: rgba(96,165,250,0.2);  color: #93c5fd; }
    .pos-verb     { background: rgba(167,243,208,0.2); color: #6ee7b7; }
    .pos-adj      { background: rgba(253,230,138,0.2); color: #fcd34d; }
    .pos-adv      { background: rgba(216,180,254,0.2); color: #c4b5fd; }
    .pos-prep     { background: rgba(253,186,116,0.2); color: #fdba74; }
    .pos-conj     { background: rgba(249,168,212,0.2); color: #f9a8d4; }
    .pos-pron     { background: rgba(134,239,172,0.2); color: #86efac; }
    .pos-other    { background: rgba(148,163,184,0.2); color: #94a3b8; }
    .popup-phonetic {
      font-family: 'Lora', serif;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 8px;
      font-style: italic;
    }
    .popup-example {
      font-family: 'Lora', serif;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.55);
      font-style: italic;
      line-height: 1.5;
      margin-bottom: 10px;
      border-left: 2px solid rgba(192,98,47,0.5);
      padding-left: 8px;
    }
    .popup-speed-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 8px 12px;
    }
    .popup-speed-adj {
      background: rgba(255,255,255,0.12);
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .popup-speed-adj:active { background: rgba(255,255,255,0.28); }
    .popup-speed-display {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.9rem;
      color: #c0622f;
      font-weight: 600;
      min-width: 40px;
      text-align: center;
    }
    .popup-save-btn.saved {
      background: #4a7c59;
    }



    /* ── Library ── */
    #library-view { display: none; flex-direction: column; gap: 12px; }
    .library-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .review-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 9px 16px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .review-btn:active { opacity: 0.8; }
    .lib-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .lib-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }
    .lib-en {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--ink);
    }
    .lib-phonetic {
      font-family: 'Lora', serif;
      font-size: 0.78rem;
      color: var(--ink-muted);
      font-style: italic;
      margin-top: 2px;
    }
    .lib-zh {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.88rem;
      color: var(--ink-muted);
      margin-bottom: 4px;
    }
    .lib-pos-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 5px; }
    .lib-example {
      font-family: 'Lora', serif;
      font-size: 0.8rem;
      color: var(--ink-muted);
      font-style: italic;
      border-left: 2px solid var(--border);
      padding-left: 8px;
      line-height: 1.5;
    }
    .lib-del {
      background: none;
      border: none;
      color: var(--border);
      font-size: 1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .lib-del:active { background: #fde8e8; color: #c0392b; }

    /* ── Flashcard ── */
    #flashcard-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 400;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }
    .flashcard-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      height: 100%;
    }
    .flashcard-progress {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
    }
    .flashcard-progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s;
      width: 0%;
    }
    .flashcard {
      flex: 1;
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 4px 20px rgba(44,40,37,0.08);
    }
    .fc-front, .fc-back { width: 100%; }
    .fc-word {
      font-size: 2rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .fc-phonetic {
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      color: var(--ink-muted);
      font-style: italic;
      margin-bottom: 16px;
    }
    .fc-tap-hint {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem;
      color: var(--border);
      margin-top: 24px;
    }
    .fc-pos {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .fc-translation {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 16px;
    }
    .fc-example {
      font-family: 'Lora', serif;
      font-size: 0.88rem;
      color: var(--ink-muted);
      font-style: italic;
      line-height: 1.6;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-top: 4px;
    }
    .fc-btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
    }
    .fc-btn {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .fc-btn:active { opacity: 0.8; }
    .fc-wrong { background: #fde8e8; color: #c0392b; }
    .fc-right { background: #e8f5ee; color: #2d7a4f; }
    .lib-io-row {
      display: flex;
      gap: 8px;
    }
    .lib-io-btn {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem;
      color: var(--ink-muted);
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      display: block;
    }
    .lib-io-btn:active { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

    .fc-close {
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 20px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.85rem;

<script>
  // ── State ──
  let vocab = JSON.parse(localStorage.getItem('wordlens-vocab') || '[]');
  let currentWord = '';
  let currentTranslation = '';
  let currentWordEl = null;
  let translationCache = {};

  const SAMPLE = `The ancient forests of the Pacific Northwest are among the most biodiverse ecosystems on Earth. Towering Douglas firs and Sitka spruces create a dense canopy that filters sunlight, casting the forest floor in a perpetual, emerald twilight. Beneath this canopy, an intricate web of life thrives — from delicate mosses clinging to every surface, to the complex fungal networks that connect the roots of trees across vast distances.

Scientists have discovered that trees communicate through these underground networks, sharing nutrients and even warning signals when pests or disease threaten. This remarkable phenomenon has transformed how we understand forests: not as collections of individual trees competing for resources, but as collaborative communities with a sophisticated, silent language of their own.`;

  // ── Tabs ──
  const tabs = document.querySelectorAll('.tab-btn');
  const views = { explore: document.getElementById('explore-view'), read: document.getElementById('read-view'), vocab: document.getElementById('vocab-view'), library: document.getElementById('library-view'), chat: document.getElementById('chat-view') };

  function switchTab(tab) {
    tabs.forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    Object.entries(views).forEach(([k, v]) => {
      const showing = k === tab;
      v.style.display = showing ? 'flex' : 'none';
      if (showing) {
        v.classList.remove('view-enter');
        void v.offsetWidth; // reflow
        v.classList.add('view-enter');
      }
    });
    progressBar.style.display = tab === 'read' ? 'block' : 'none';
    if (tab === 'vocab') renderVocab();
    if (tab === 'explore') renderExplore();
    if (tab === 'library') renderLibrary();
    if (tab === 'chat' && chatPhase === 'select') renderChatHome();
    if (tab === 'read') { updateProgress(); }
  }

  tabs.forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));

  // ── Sample ──
  document.getElementById('sample-btn')?.addEventListener('click', () => {
    document.getElementById('article-input').value = SAMPLE;
  });

  // ── Start reading ──
  document.getElementById('start-btn')?.addEventListener('click', () => {
    const text = document.getElementById('article-input').value.trim();
    if (!text) { alert('請先貼上文章！'); return; }
    renderArticle(text);
    switchTab('read');
  });

  document.getElementById('back-btn').addEventListener('click', () => {
    stopReadAloud();
    isPaused = false;
    switchTab('input');
  });

  // ── Render article with clickable words ──
  function renderArticle(text) {
    currentArticleText = text;
    const body = document.getElementById('article-body');
    const words = text.split(/(\s+|[\n\r]+)/);
    let wordCount = 0;
    let html = '';
    let charPos = 0;

    words.forEach(part => {
      if (/\n/.test(part)) {
        html += '<br><br>';
        charPos += part.length;
      } else if (/\s+/.test(part)) {
        html += ' ';
        charPos += part.length;
      } else if (part) {
        const clean = part.replace(/[^a-zA-Z'-]/g, '');
        const prefix = part.match(/^[^a-zA-Z'-]*/)?.[0] || '';
        const suffix = part.match(/[^a-zA-Z'-]*$/)?.[0] || '';
        if (clean) {
          wordCount++;
          const wordStart = charPos + prefix.length;
          const isLooked = vocab.some(v => v.en.toLowerCase() === clean.toLowerCase());
          html += `${prefix}<span class="word${isLooked ? ' looked-up' : ''}" data-word="${clean}" data-start="${wordStart}">${clean}</span>${suffix}`;
        } else {
          html += part;
        }
        charPos += part.length;
      }
    });

    body.innerHTML = html;
    document.getElementById('word-count').textContent = `${wordCount} 個單字`;

    // Reset translation panel
    const tSection = document.getElementById('translation-section');
    if (tSection) {
      tSection.style.display = 'none';
      document.getElementById('translation-body').textContent = '';
      document.getElementById('translate-all-icon').textContent = '🌐';
      document.getElementById('translate-all-label').textContent = '顯示全文翻譯';
      const tBtn = document.getElementById('translate-all-btn');
      tBtn.classList.remove('loaded');
      tBtn.disabled = false;
    }

    body.querySelectorAll('.word').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        showPopup(el.dataset.word, el);
      });
    });
  }

  // ── Translation ──
  async function translate(word) {
    const key = word.toLowerCase();
    if (translationCache[key]) return translationCache[key];
    try {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q=${encodeURIComponent(word)}`;
      const res = await fetch(url);
      const data = await res.json();
      const result = data?.[0]?.[0]?.[0] || '（翻譯失敗）';
      translationCache[key] = result;
      return result;
    } catch {
      // Fallback to MyMemory
      try {
        const res2 = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|zh-TW`);
        const data2 = await res2.json();
        const result2 = data2?.responseData?.translatedText || '（翻譯失敗）';
        translationCache[key] = result2;
        return result2;
      } catch {
        return '❌ 請確認網路連線';
      }
    }
  }

  // ── Dictionary ──
  let dictCache = {};
  const POS_MAP = {
    'noun': ['noun','名詞','pos-noun'],
    'verb': ['verb','動詞','pos-verb'],
    'adjective': ['adj','形容詞','pos-adj'],
    'adverb': ['adv','副詞','pos-adv'],
    'preposition': ['prep','介係詞','pos-prep'],
    'conjunction': ['conj','連接詞','pos-conj'],
    'pronoun': ['pron','代名詞','pos-pron'],
    'article': ['art','冠詞','pos-other'],
    'exclamation': ['excl','感嘆詞','pos-other'],
  };

  async function fetchDictionary(word) {
    const key = word.toLowerCase();
    if (dictCache[key]) return dictCache[key];
    try {
      const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(key)}`);
      if (!res.ok) { dictCache[key] = null; return null; }
      const data = await res.json();
      const entry = data[0];
      const phonetic = entry.phonetic || entry.phonetics?.find(p => p.text)?.text || '';
      const meanings = entry.meanings || [];
      const result = { phonetic, meanings: [] };
      meanings.forEach(m => {
        const posKey = Object.keys(POS_MAP).find(k => m.partOfSpeech?.toLowerCase().includes(k));
        const [short, zh, cls] = posKey ? POS_MAP[posKey] : ['?','?','pos-other'];
        const def = m.definitions?.[0];
        const example = def?.example || '';
        result.meanings.push({ pos: m.partOfSpeech, short, zh, cls, example });
      });
      dictCache[key] = result;
      return result;
    } catch {
      dictCache[key] = null;
      return null;
    }
  }

  // ── Popup ──
  const popup = document.getElementById('popup');
  const overlay = document.getElementById('popup-overlay');

  function showPopup(word, el) {
    currentWord = word;
    currentWordEl = el;
    currentTranslation = '';

    document.getElementById('popup-word').textContent = word;
    const transEl = document.getElementById('popup-translation');
    transEl.textContent = '';
    transEl.classList.add('loading-text');
    document.getElementById('popup-meta').innerHTML = '';
    document.getElementById('popup-phonetic').textContent = '';
    document.getElementById('popup-example').textContent = '';

    const saveBtn = document.getElementById('popup-save');
    const alreadySaved = vocab.some(v => v.en.toLowerCase() === word.toLowerCase());
    saveBtn.textContent = alreadySaved ? '✓ 已在單字本' : '＋ 加入單字本';
    saveBtn.classList.toggle('saved', alreadySaved);
    const libBtn = document.getElementById('popup-lib-save');
    const inLib = library.some(v => v.en.toLowerCase() === word.toLowerCase());
    libBtn.textContent = inLib ? '✓ 已在單字庫' : '＋ 單字庫';
    libBtn.style.opacity = inLib ? '0.7' : '1';

    // Position popup
    const rect = el.getBoundingClientRect();
    const popupEl = popup;
    const margin = 12;
    const popupW = Math.min(320, window.innerWidth * 0.88);
    const popupH = 160;

    let top = rect.bottom + margin;
    let left = rect.left;
    if (left + popupW > window.innerWidth - margin) left = window.innerWidth - popupW - margin;
    if (left < margin) left = margin;
    if (top + popupH > window.innerHeight - margin) top = rect.top - popupH - margin;

    popupEl.style.top = top + 'px';
    popupEl.style.left = left + 'px';
    popupEl.style.width = popupW + 'px';

    popup.classList.add('show');
    syncPopupSpeed();
    overlay.classList.add('active');

    Promise.all([translate(word), fetchDictionary(word)]).then(([translation, dict]) => {
      currentTranslation = translation;
      transEl.classList.remove('loading-text');
      transEl.textContent = translation;

      if (dict) {
        // Phonetic
        if (dict.phonetic) {
          document.getElementById('popup-phonetic').textContent = dict.phonetic;
        }
        // Part of speech badges
        const metaEl = document.getElementById('popup-meta');
        const seen = new Set();
        dict.meanings.forEach(m => {
          if (!seen.has(m.short)) {
            seen.add(m.short);
            const badge = document.createElement('span');
            badge.className = 'pos-badge ' + m.cls;
            badge.textContent = m.short + ' ' + m.zh;
            metaEl.appendChild(badge);
          }
        });
        // Example - prefer preposition/verb, else first available
        const priority = ['preposition','verb','noun','adjective'];
        let bestExample = '';
        for (const p of priority) {
          const m = dict.meanings.find(m => m.pos?.includes(p) && m.example);
          if (m) { bestExample = m.example; break; }
        }
        if (!bestExample) {
          const m = dict.meanings.find(m => m.example);
          if (m) bestExample = m.example;
        }
        if (bestExample) {
          document.getElementById('popup-example').textContent = '"' + bestExample + '"';
        }
      }
    });
  }

  function hidePopup() {
    popup.classList.remove('show');
    overlay.classList.remove('active');
  }

  overlay.addEventListener('click', hidePopup);
  document.getElementById('popup-close').addEventListener('click', (e) => { e.stopPropagation(); hidePopup(); });
  document.getElementById('popup').addEventListener('click', (e) => e.stopPropagation());

  // ── Speech Rate ──
  var speechRate = 0.9;
  var currentArticleText = '';
  var isReadingAloud = false;
  var isRestarting = false;
  var articleText = '';
  var currentCharIndex = 0;
  const sliderEl   = document.getElementById('speed-slider');
  const fillEl     = document.getElementById('speed-fill');
  const thumbEl    = document.getElementById('speed-thumb');
  const speedLabel = document.getElementById('speed-value');
  const MIN = 0.1, MAX = 1.5, STEP = 0.1;

  function setRate(pct) {
    pct = Math.max(0, Math.min(1, pct));
    const raw = MIN + pct * (MAX - MIN);
    speechRate = Math.round(raw / STEP) * STEP;
    speechRate = Math.round(speechRate * 10) / 10;
    const dp = (speechRate - MIN) / (MAX - MIN) * 100;
    fillEl.style.width = dp + '%';
    thumbEl.style.left = dp + '%';
    speedLabel.textContent = speechRate.toFixed(1) + 'x';
    // 朗讀中：取消後從目前位置以新語速重新開始
    if (isReadingAloud && !isPaused) {
      startSpeakingFrom(currentCharIndex);
    }
  }

  function pctFromEvent(e) {
    const rect = sliderEl.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return (clientX - rect.left) / rect.width;
  }

  sliderEl.addEventListener('touchstart', (e) => {
    e.preventDefault();
    thumbEl.classList.add('dragging');
    setRate(pctFromEvent(e));
  }, { passive: false });

  sliderEl.addEventListener('touchmove', (e) => {
    e.preventDefault();
    setRate(pctFromEvent(e));
  }, { passive: false });

  sliderEl.addEventListener('touchend', () => thumbEl.classList.remove('dragging'));

  sliderEl.addEventListener('mousedown', (e) => {
    thumbEl.classList.add('dragging');
    setRate(pctFromEvent(e));
    const onMove = (e) => setRate(pctFromEvent(e));
    const onUp = () => {
      thumbEl.classList.remove('dragging');
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });

  setRate((0.9 - MIN) / (MAX - MIN));

  // ── Read Aloud ──

  // ── Word Highlight Helpers ──
  function clearHighlights() {
    document.querySelectorAll('.word-speaking, .word-read').forEach(el => {
      el.classList.remove('word-speaking', 'word-read');
    });
  }

  function highlightAt(absCharIndex) {
    const allWords = Array.from(document.querySelectorAll('#article-body .word[data-start]'));
    if (!allWords.length) return;

    let speakingEl = null;
    let minDiff = Infinity;
    allWords.forEach(el => {
      const start = parseInt(el.dataset.start);
      const diff = Math.abs(start - absCharIndex);
      if (diff < minDiff) { minDiff = diff; speakingEl = el; }
    });

    allWords.forEach(el => {
      el.classList.remove('word-speaking');
      const start = parseInt(el.dataset.start);
      if (speakingEl && start < parseInt(speakingEl.dataset.start)) {
        el.classList.add('word-read');
      } else {
        el.classList.remove('word-read');
      }
    });
    if (speakingEl) {
      speakingEl.classList.add('word-speaking');
      speakingEl.classList.remove('word-read');
      // Auto-scroll into view smoothly
      speakingEl.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'nearest' });
    }
  }

  function startSpeakingFrom(charIndex) {
    isRestarting = true;
    window.speechSynthesis.cancel();
    const textToSpeak = articleText.slice(charIndex);
    if (!textToSpeak.trim()) { isRestarting = false; stopReadAloud(); return; }
    const utter = new SpeechSynthesisUtterance(textToSpeak);
    utter.lang = 'en-US';
    utter.rate = speechRate;
    utter.onboundary = (e) => {
      if (e.name === 'word') {
        currentCharIndex = charIndex + e.charIndex;
        highlightAt(currentCharIndex);
      }
    };
    utter.onend = () => {
      if (!isRestarting && isReadingAloud) stopReadAloud();
    };
    utter.onerror = (e) => {
      if (!isRestarting && e.error !== 'interrupted' && isReadingAloud) stopReadAloud();
    };
    setTimeout(() => { isRestarting = false; window.speechSynthesis.speak(utter); }, 80);
  }

  var isPaused = false;

  function setReadAloudUI(state) {
    // state: 'stopped' | 'playing' | 'paused'
    const mainBtn  = document.getElementById('read-aloud-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const icon     = document.getElementById('read-aloud-icon');
    const label    = document.getElementById('read-aloud-label');
    const pauseIcon = document.getElementById('pause-icon');
    mainBtn.classList.remove('playing', 'paused');
    pauseBtn.style.display = 'none';
    if (state === 'playing') {
      mainBtn.classList.add('playing');
      icon.textContent = '⏹';
      label.textContent = '停止朗讀';
      pauseBtn.style.display = 'flex';
      pauseBtn.classList.remove('paused');
      pauseBtn.classList.add('playing');
      pauseIcon.textContent = '⏸';
    } else if (state === 'paused') {
      mainBtn.classList.add('paused');
      icon.textContent = '▶';
      label.textContent = '繼續朗讀';
      pauseBtn.style.display = 'flex';
      pauseBtn.classList.remove('playing');
      pauseBtn.classList.add('paused');
      pauseIcon.textContent = '⏹';
    } else {
      icon.textContent = '🔊';
      label.textContent = '朗讀全文';
    }
  }

  function stopReadAloud() {
    window.speechSynthesis.cancel();
    isReadingAloud = false;

    currentCharIndex = 0;

  function pauseReadAloud() {
    if (!isReadingAloud || isPaused) return;

  function resumeReadAloud() {

    if (!window.speechSynthesis) return;

  // ── Library (永久單字庫) ──
  var library = JSON.parse(localStorage.getItem('wordlens-library') || '[]');

  function saveToLibrary(word, translation, dict) {
    if (library.some(w => w.en.toLowerCase() === word.toLowerCase())) return false;
    const entry = { en: word, zh: translation, phonetic: '', posList: [], example: '' };
    if (dict) {
      entry.phonetic = dict.phonetic || '';
      const seen = new Set();
      dict.meanings.forEach(m => {
        if (!seen.has(m.short)) { seen.add(m.short); entry.posList.push({ short: m.short, zh: m.zh, cls: m.cls }); }
      });
      const priority = ['preposition','verb','noun','adjective'];
      for (const p of priority) {
        const m = dict.meanings.find(m => m.pos?.includes(p) && m.example);
        if (m) { entry.example = m.example; break; }
      }
      if (!entry.example) {
        const m = dict.meanings.find(m => m.example);
        if (m) entry.example = m.example;
      }
    }
    library.unshift(entry);
    localStorage.setItem('wordlens-library', JSON.stringify(library));
    return true;
  }

  function renderLibrary() {
    const list = document.getElementById('library-list');

    list.querySelectorAll('.lib-del').forEach(btn => {

  async function translateFullArticle() {
    const text = document.getElementById('article-body').innerText.trim();
    if (!text) return;

    const btn = document.getElementById('translate-all-btn');
    const section = document.getElementById('translation-section');
    const body = document.getElementById('translation-body');
    const icon = document.getElementById('translate-all-icon');
    const label = document.getElementById('translate-all-label');

    // Already loaded — toggle show/hide
    if (fullTranslationCache[text]) {
      const visible = section.style.display !== 'none';
      section.style.display = visible ? 'none' : 'block';
      label.textContent = visible ? '顯示全文翻譯' : '隱藏全文翻譯';
      return;
    }

    // Loading
    icon.textContent = '⏳';
    label.textContent = '翻譯中...';
    btn.disabled = true;
    section.style.display = 'block';
    body.innerHTML = '<div class="translation-loading">正在翻譯全文，請稍候...</div>';

    try {
      // Try Gemini first if key exists
      if (anthropicKey) {
        const prompt = `將以下英文文章翻譯成繁體中文，保持段落結構，只輸出翻譯結果，不要加任何說明：

${text}`;
        const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-goog-api-key': anthropicKey },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await res.json();
        if (!data.error) {
          const translation = data.candidates[0].content.parts[0].text.trim();
          fullTranslationCache[text] = translation;
          body.textContent = translation;
          icon.textContent = '🌐';
          label.textContent = '隱藏全文翻譯';
          btn.classList.add('loaded');
          btn.disabled = false;
          return;
        }
      }
      // Fallback: MyMemory paragraph by paragraph
      const paragraphs = text.split(/\n\n+/);
      const translated = [];
      for (const para of paragraphs) {
        if (!para.trim()) continue;
        const res = await fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(para.slice(0,500)) + '&langpair=en|zh-TW');
        const data = await res.json();
        translated.push(data?.responseData?.translatedText || para);
      }
      const result = translated.join('\n\n');
      fullTranslationCache[text] = result;
      body.textContent = result;
      icon.textContent = '🌐';
      label.textContent = '隱藏全文翻譯';
      btn.classList.add('loaded');
    } catch(e) {
      body.innerHTML = '<div class="translation-loading">翻譯失敗，請確認網路連線</div>';
      icon.textContent = '🌐';
      label.textContent = '顯示全文翻譯';
    }
    btn.disabled = false;
  }

  function buildSystemPrompt(mode, scenario, level) {
    const lvl = LEVEL_PROMPTS[level];
    if (mode === 'roleplay') {
      return `You are a ${scenario.role} in a ${scenario.en} scenario. ${lvl} Keep responses to 2-3 sentences. Stay in character. If the user makes grammar mistakes, naturally model the correct form in your response without explicitly pointing it out. Start by setting the scene and greeting the user.`;
    } else if (mode === 'free') {
      return `You are a friendly English conversation partner discussing ${scenario.en}. ${lvl} Keep responses conversational and engaging, 2-4 sentences. Ask follow-up questions to keep the conversation going. If the user makes notable grammar mistakes, gently correct by modeling the correct form. Start with a warm greeting and an interesting opening question about the topic.`;
    } else {
      return `You are playing a role where the user must: "${scenario.goal}". ${lvl} Respond naturally but require the user to provide all necessary information to complete the task. Don't make it too easy — ask for details. Keep responses to 2-3 sentences. Start by setting the scene.`;
    }
  }

  async function sendToAI(systemPrompt, isFirst) {
    if (!anthropicKey) { addMessage('ai', '⚠️ 請先在探索頁面設定 Gemini API Key 才能使用對話功能。'); return; }
    const typingId = showTyping();
    try {
      const messages = isFirst
        ? [{ role:'user', parts:[{ text: systemPrompt + '\n\nStart the conversation now.' }] }]
        : [{ role:'user', parts:[{ text: systemPrompt }] }, ...chatHistory];

      const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent', {
        method: 'POST',
        headers: { 'Content-Type':'application/json', 'x-goog-api-key': anthropicKey },
        body: JSON.stringify({ contents: messages, generationConfig:{ temperature:0.85, maxOutputTokens:200 } })
      });
      const data = await res.json();
      removeTyping(typingId);
      if (data.error) throw new Error(data.error.message);
      const reply = data.candidates[0].content.parts[0].text.trim();
      chatHistory.push({ role:'model', parts:[{ text: reply }] });
      addMessage('ai', reply);
    } catch(e) {
      removeTyping(typingId);
      addMessage('ai', '⚠️ 連線錯誤：' + e.message);
    }
  }

    if (role === 'ai') {
      const tranEl = document.createElement('div');
      tranEl.className = 'msg-translation' + (showTranslations ? ' visible' : '');
      tranEl.dataset.text = text;
      if (showTranslations && !chatTranslationCache[text]) {
        tranEl.textContent = '翻譯中...';
        translate(text).then(t => { chatTranslationCache[text] = t; tranEl.textContent = t; });
      } else if (chatTranslationCache[text]) {
        tranEl.textContent = chatTranslationCache[text];
      }
      wrap.appendChild(tranEl);
    }
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const msgs = document.getElementById('chat-messages');
    const id = 'typing_' + Date.now();
    const div = document.createElement('div');
    div.id = id; div.className = 'msg-wrap ai';
    div.innerHTML = '<div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return id;
  }
  function removeTyping(id) { document.getElementById(id)?.remove(); }

  // Send message
  document.getElementById('chat-send-btn').addEventListener('click', sendUserMessage);
  document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendUserMessage(); }
  });

  function sendUserMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    addMessage('user', text);
    chatHistory.push({ role:'user', parts:[{ text }] });
    const sys = buildSystemPrompt(chatScenario.mode, chatScenario.scenario, chatScenario.level);
    sendToAI(sys, false);
  }

  // Auto resize textarea
  document.getElementById('chat-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });

  // Toggle translation
  document.getElementById('translate-toggle-btn').addEventListener('click', async () => {
    showTranslations = !showTranslations;
    document.getElementById('translate-toggle-btn').classList.toggle('active', showTranslations);
    document.querySelectorAll('.msg-translation').forEach(async el => {
      el.classList.toggle('visible', showTranslations);
      if (showTranslations && !el.textContent) {
        const t = el.dataset.text;
        if (!chatTranslationCache[t]) {
          el.textContent = '翻譯中...';
          const result = await translate(t);
          chatTranslationCache[t] = result;
          el.textContent = result;
        } else {
          el.textContent = chatTranslationCache[t];
        }
      }
    });
  });

  // End chat → get feedback
  document.getElementById('end-chat-btn').addEventListener('click', async () => {
    if (chatHistory.length < 3) { alert('對話太短，請多聊幾句再結束'); return; }
    document.getElementById('chat-screen').style.display = 'none';
    const feedback = document.getElementById('chat-feedback');
    feedback.style.display = 'flex';
    document.getElementById('feedback-body').innerHTML = '<div class="translation-loading">正在分析對話，請稍候...</div>';

    try {
      const convo = chatHistory.filter(m => m.parts[0].text !== '__START__')
        .map(m => (m.role === 'user' ? 'User: ' : 'AI: ') + m.parts[0].text).join('\n');

      const prompt = `Analyse this English conversation and respond ONLY in valid JSON with this structure:
{"score": 75, "scoreLabel": "不錯", "corrections": [{"wrong": "I am go", "right": "I am going", "tip": "使用現在進行式"}], "vocab": ["suggestion 1", "suggestion 2"], "summary": "整體評語（繁體中文）"}
Conversation:
${convo}`;

      const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-goog-api-key':anthropicKey},
        body: JSON.stringify({ contents:[{ role:'user', parts:[{ text:prompt }] }], generationConfig:{temperature:0.3,maxOutputTokens:600} })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const raw = data.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim();
      const fb = JSON.parse(raw);
      renderFeedback(fb);
    } catch(e) {
      document.getElementById('feedback-body').innerHTML = '<div class="translation-loading">分析失敗：' + e.message + '</div>';
    }
  });

  function renderFeedback(fb) {
    const corrections = (fb.corrections || []).map(c => `
      <div class="feedback-item">
        <span class="wrong">✗ ${c.wrong}</span> → <span class="right">✓ ${c.right}</span>
        <div style="font-size:0.8rem;color:var(--ink-muted);margin-top:2px;">${c.tip}</div>
      </div>`).join('') || '<div class="feedback-item">沒有發現明顯錯誤 🎉</div>';

    const vocab = (fb.vocab || []).map(v => `<div class="feedback-item">💡 ${v}</div>`).join('');

    document.getElementById('feedback-body').innerHTML = `
      <div class="feedback-score">
        <div class="feedback-score-num">${fb.score || '--'}</div>
        <div class="feedback-score-label">${fb.scoreLabel || '分'}</div>
      </div>
      <div class="feedback-section">
        <div class="feedback-section-title">整體評語</div>
        <div style="font-family:Noto Sans TC,sans-serif;font-size:0.9rem;line-height:1.7;color:var(--ink);">${fb.summary || ''}</div>
      </div>
      ${fb.corrections?.length ? `<div class="feedback-section"><div class="feedback-section-title">語法修正</div>${corrections}</div>` : ''}
      ${fb.vocab?.length ? `<div class="feedback-section"><div class="feedback-section-title">單字建議</div>${vocab}</div>` : ''}`;
  }

  document.getElementById('new-chat-btn').addEventListener('click', () => {
    document.getElementById('chat-feedback').style.display = 'none';
    document.getElementById('chat-home').style.display = 'flex';
    renderChatHome();
  });


  // ── Daily Articles ──
  const NEWS_PROMPTS = [
    { topic:'World News', style:'news', titleHint:'international current event' },
    { topic:'Business',   style:'news', titleHint:'business or economy story' },
    { topic:'Health',     style:'magazine', titleHint:'health or wellness feature' },
    { topic:'Lifestyle',  style:'magazine', titleHint:'lifestyle or trend story' },
    { topic:'Tech News',  style:'news', titleHint:'technology news' },
  ];

  async function generateDailyArticle(prompt, level) {
    const styleGuide = prompt.style === 'news'
      ? 'Write in AP news style: strong lead sentence with who/what/when/where, inverted pyramid structure, quote one expert, end with context.'
      : 'Write in magazine feature style: engaging opening anecdote, narrative flow, pull in the reader, end with a memorable takeaway.';
    const p = `Write a ${level} CEFR graded reading ${prompt.style} article about a ${prompt.titleHint}. ${styleGuide} Make it feel current and real. Return ONLY valid JSON: {"title":"English headline","titleZh":"中文標題","content":"article text","style":"${prompt.style}"}. No markdown.`;
    const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-goog-api-key':anthropicKey},
      body: JSON.stringify({ contents:[{parts:[{text:p}]}], generationConfig:{temperature:0.9,maxOutputTokens:700} })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const raw = data.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim();
    return JSON.parse(raw);
  }

  var dailyCache = JSON.parse(localStorage.getItem('wordlens-daily') || 'null');
  var todayKey = new Date().toISOString().slice(0,10);

  function renderDailyArticles() {
    const el = document.getElementById('daily-articles');
    if (!dailyCache || dailyCache.date !== todayKey || !dailyCache.articles?.length) {
      el.innerHTML = '<div class="vocab-empty" style="padding:20px 0 4px;">今天還沒有精選文章<br><span style="font-size:0.8rem;">設定 Gemini Key 後按「↺ 更新」生成</span></div>';
      return;
    }
    el.innerHTML = dailyCache.articles.map(art => {
      const [bg,,emoji] = TOPIC_COLORS[art.topic] || ['#f3f4f6','#374151','📄'];
      const badgeCls = art.style === 'news' ? 'badge-news' : art.style === 'magazine' ? 'badge-magazine' : 'badge-article';
      const badgeLabel = art.style === 'news' ? '新聞' : art.style === 'magazine' ? '雜誌' : '文章';
      return `<div class="art-card" data-id="${art.id}">
        <div class="art-cover" style="background:${bg};">${emoji}
          <div class="art-level-badge" style="background:${LEVEL_COLORS[art.level]||'#ccc'};color:#1a1a1a;">${art.level}</div>
        </div>
        <div class="art-body">
          <span class="art-style-badge ${badgeCls}">${badgeLabel}</span>
          <div class="art-title-zh">${art.titleZh}</div>
          <div class="art-preview">${art.content.slice(0,100)}...</div>
          <div class="art-date">今日精選</div>
        </div>
      </div>`;
    }).join('');
    el.querySelectorAll('.art-card').forEach(card => {
      card.addEventListener('click', () => {
        const art = dailyCache.articles.find(a => a.id === card.dataset.id);
        if (art) loadArticle(art);
      });
    });
  }

  document.getElementById('daily-refresh-btn').addEventListener('click', async () => {
    if (!anthropicKey) { alert('請先設定 Gemini API Key'); return; }
    const btn = document.getElementById('daily-refresh-btn');
    btn.classList.add('spinning');
    btn.textContent = '生成中...';
    const el = document.getElementById('daily-articles');
    el.innerHTML = '<div class="translation-loading">正在生成今日精選文章...</div>';

    try {
      const level = 'B1';
      const picks = NEWS_PROMPTS.sort(() => Math.random()-0.5).slice(0,3);
      const articles = [];
      for (const p of picks) {
        const art = await generateDailyArticle(p, level);
        articles.push({ ...art, id:'daily_'+Date.now()+'_'+Math.random().toString(36).slice(2), topic:p.topic, level, date:Date.now() });
        await new Promise(r => setTimeout(r, 300));
      }
      dailyCache = { date: todayKey, articles };
      localStorage.setItem('wordlens-daily', JSON.stringify(dailyCache));
      // Also add to main article library
      storedArticles = [...articles, ...storedArticles];
      allArticles = [...SEED_ARTICLES, ...storedArticles];
      localStorage.setItem('wordlens-articles', JSON.stringify(storedArticles));
      renderDailyArticles();
    } catch(e) {
      el.innerHTML = '<div class="translation-loading">生成失敗：' + e.message + '</div>';
    }
    btn.classList.remove('spinning');
    btn.textContent = '↺ 更新';
  });

  renderDailyArticles();


  // ── RSS Feed Reader ──
  // ── News (Guardian + AI fallback) ──
  var activeNewsTopic = 'world';
  var activeGeminiTopic = 'World News';
  var activeNewsSource = 'guardian';
  var newsCache = {};
  var guardianKey = localStorage.getItem('wordlens-guardian-key') || '';

  const NEWS_ICONS = {
    'world':'🌍','lifeandstyle':'🏥','science':'🔬',
    'technology':'💻','business':'💹','culture':'🎭'
  };
  const GUARDIAN_SECTION_NAMES = {
    'world':'World','lifeandstyle':'Health & Life','science':'Science',
    'technology':'Technology','business':'Business','culture':'Culture'
  };

  // Guardian Key UI
  function updateGuardianKeyUI() {
    const row = document.getElementById('guardian-key-row');
    const status = document.getElementById('guardian-key-status');
    if (!row || !status) return;
    if (guardianKey) {
      row.style.display = 'none';
      status.innerHTML = '<span style="color:rgba(255,255,255,0.5);font-size:0.78rem;">✓ Guardian Key 已儲存 <span id="clear-guardian-key" style="cursor:pointer;text-decoration:underline;">清除</span></span>';
      document.getElementById('clear-guardian-key')?.addEventListener('click', () => {
        guardianKey = '';
        localStorage.removeItem('wordlens-guardian-key');
        row.style.display = 'flex';
        status.innerHTML = '<span style="color:rgba(255,255,255,0.45);font-size:0.75rem;">👉 免費申請 <a href="https://open-platform.theguardian.com/access/" target="_blank" style="color:#fbb36a;">Guardian API Key</a></span>';
      });
    } else {
      row.style.display = 'flex';
      status.innerHTML = '<span style="color:rgba(255,255,255,0.45);font-size:0.75rem;">👉 免費申請 <a href="https://open-platform.theguardian.com/access/" target="_blank" style="color:#fbb36a;">Guardian API Key</a>（可選）</span>';
    }
  }

  document.getElementById('guardian-key-save')?.addEventListener('click', () => {
    const val = document.getElementById('guardian-key-input')?.value.trim();
    if (!val) return;
    guardianKey = val;
    localStorage.setItem('wordlens-guardian-key', val);
    updateGuardianKeyUI();
  });
  updateGuardianKeyUI();

  // Source toggle
  document.querySelectorAll('.nsrc-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nsrc-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeNewsSource = btn.dataset.src;
    });
  });

  // Topic filter
  document.querySelectorAll('#rss-source-filter .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#rss-source-filter .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeNewsTopic = btn.dataset.topic;
      activeGeminiTopic = btn.dataset.geminiTopic || btn.dataset.topic;
      const cacheKey = activeNewsSource + '_' + activeNewsTopic;
      if (newsCache[cacheKey]) renderNewsItems(newsCache[cacheKey]);
    });
  });

  document.getElementById('rss-refresh-btn').addEventListener('click', loadNews);

  async function loadNews() {
    const cacheKey = activeNewsSource + '_' + activeNewsTopic;
    delete newsCache[cacheKey];
    if (activeNewsSource === 'guardian') {
      await loadGuardianNews();
    } else {
      await generateAINews();
    }
  }

  // ── Guardian API ──
  async function loadGuardianNews() {
    const key = guardianKey || 'test';
    const btn = document.getElementById('rss-refresh-btn');
    const el = document.getElementById('rss-articles');
    btn.classList.add('spinning'); btn.textContent = '載入中...';
    el.innerHTML = '<div class="rss-loading">從 The Guardian 載入新聞...</div>';

    const url = 'https://content.guardianapis.com/search?api-key=' + key +
      '&section=' + activeNewsTopic +
      '&show-fields=trailText,bodyText,thumbnail' +
      '&page-size=6&order-by=newest&format=json';
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status + (res.status===401?' (請輸入正確的 Guardian Key)':' (請確認網路)'));
      const data = await res.json();
      const results = data.response?.results || [];
      if (!results.length) throw new Error('沒有找到文章');

      const items = results.map(r => ({
        id: 'guardian_' + r.id?.replace(/\//g,'_'),
        title: r.webTitle,
        titleZh: '',
        trailText: (r.fields?.trailText || '').replace(/<[^>]+>/g,''),
        bodyText: r.fields?.bodyText || '',
        url: r.webUrl,
        date: r.webPublicationDate?.slice(0,10) || '',
        topic: activeNewsTopic,
        icon: NEWS_ICONS[activeNewsTopic] || '📰',
        source: 'The Guardian',
        isReal: true,
      }));

      const cacheKey = 'guardian_' + activeNewsTopic;
      newsCache[cacheKey] = items;
      renderNewsItems(items);
    } catch(e) {
      if (!guardianKey) {
        el.innerHTML = '<div class="rss-loading">需要 Guardian API Key<br><span style="font-size:0.75rem;">請在上方「探索」頁面輸入免費的 Guardian Key</span></div>';
      } else {
        el.innerHTML = '<div class="rss-loading">載入失敗：' + e.message + '</div>';
      }
    }
    btn.classList.remove('spinning'); btn.textContent = '↺ 載入';
  }

  // ── Gemini AI News ──
  async function generateAINews() {
    if (!anthropicKey) {
      document.getElementById('rss-articles').innerHTML =
        '<div class="rss-loading">請先設定 Gemini API Key</div>';
      return;
    }
    const btn = document.getElementById('rss-refresh-btn');
    const el = document.getElementById('rss-articles');
    btn.classList.add('spinning'); btn.textContent = '生成中...';
    el.innerHTML = '<div class="rss-loading">AI 正在搜尋並撰寫今日新聞...</div>';
    const today = new Date().toLocaleDateString('zh-TW');
    const prompt = 'Search for 4 recent real news stories about ' + activeGeminiTopic + ' today. For each story, rewrite as a B1 CEFR English learning article (200-250 words). Return ONLY JSON array: [{"title":"headline","titleZh":"中文標題","source":"source name","trailText":"1 sentence summary","bodyText":"full article 200-250 words"}]';
    try {
      const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-goog-api-key':anthropicKey},
        body: JSON.stringify({contents:[{parts:[{text:prompt}]}],tools:[{'google_search':{}}],generationConfig:{temperature:0.4,maxOutputTokens:2000}})
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const rawText = data.candidates[0].content.parts.filter(p=>p.text).map(p=>p.text).join('');
      const jsonMatch = rawText.match(/\[[\s\S]*\]/);
      if (!jsonMatch) throw new Error('格式錯誤');
      const arts = JSON.parse(jsonMatch[0]);
      const items = arts.map((a,i) => ({...a, id:'ai_'+Date.now()+'_'+i, topic:activeNewsTopic, icon:NEWS_ICONS[activeNewsTopic]||'📰', date:today, isReal:true}));
      newsCache['gemini_'+activeNewsTopic] = items;
      renderNewsItems(items);
    } catch(e) {
      el.innerHTML = '<div class="rss-loading">生成失敗：' + e.message + '</div>';
    }
    btn.classList.remove('spinning'); btn.textContent = '↺ 載入';
  }

  function renderNewsItems(items) {
    const el = document.getElementById('rss-articles');
    if (!items.length) { el.innerHTML = '<div class="rss-loading">沒有文章</div>'; return; }
    el.innerHTML = items.map((item,i) =>
      '<div class="rss-card" data-index="' + i + '" data-cache="' + (activeNewsSource+'_'+activeNewsTopic) + '">' +
        '<div class="rss-icon" style="background:linear-gradient(135deg,#1a237e,#1565c0);">' + item.icon + '</div>' +
        '<div style="flex:1;min-width:0;">' +
          '<span class="art-style-badge badge-news">' + (item.source||'News') + '</span>' +
          '<div class="rss-title">' + item.title + '</div>' +
          (item.trailText ? '<div class="art-preview">' + item.trailText.slice(0,100) + '...</div>' : '') +
          '<div class="rss-meta">' + item.date + (item.isReal?' · 🌐 真實新聞':'') + '</div>' +
        '</div>' +
      '</div>'
    ).join('');
    el.querySelectorAll('.rss-card').forEach(card => {
      card.addEventListener('click', () => {
        const cacheKey = card.dataset.cache;
        const allItems = newsCache[cacheKey] || newsCache['guardian_'+activeNewsTopic] || newsCache['gemini_'+activeNewsTopic] || [];
        const item = allItems[parseInt(card.dataset.index)];
        if (item) openNewsArticle(item);
      });
    });
  }

  async function openNewsArticle(item) {
    const text = item.bodyText || item.trailText || '';
    if (text && text.length > 100) {
      renderArticle(text);
      switchTab('read');
      document.getElementById('word-count').textContent = (item.source||'Guardian') + '　' + item.date;
      return;
    }
    // Short text — use Gemini to expand
    if (!anthropicKey) { renderArticle(item.trailText || item.title); switchTab('read'); return; }
    switchTab('read');
    document.getElementById('article-body').innerHTML = '<div class="translation-loading" style="padding:40px 0;">正在擴寫文章...</div>';
    try {
      const prompt = 'Rewrite this news headline into a B1 CEFR English learning article (250-300 words): ' + item.title + '. Context: ' + (item.trailText||'');
      const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-goog-api-key':anthropicKey},
        body: JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.5,maxOutputTokens:500}})
      });
      const data = await res.json();
      const expanded = data.candidates[0].content.parts[0].text.trim();
      renderArticle(expanded);
    } catch(e) {
      renderArticle(item.trailText || item.title);
    }
    document.getElementById('word-count').textContent = (item.source||'Guardian') + '　' + item.date;
  }

  document.getElementById('rss-articles').innerHTML =
    '<div class="rss-loading">點「↺ 載入」取得 The Guardian 最新新聞</div>';

    // ── PWA Service Worker ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="WordLens" />
  <meta name="theme-color" content="#2c2825" />
  <link rel="manifest" href="manifest.json" />
  <title>WordLens</title>

  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #faf8f4;
      --surface: #ffffff;
      --ink: #2c2825;
      --ink-muted: #7a7068;
      --accent: #c0622f;
      --accent-light: #f5e6dc;
      --border: #e8e2d8;
      --word-hover: #fdebd8;
      --popup-bg: #2c2825;
      --popup-text: #faf8f4;
      --radius: 14px;
      --shadow: 0 8px 32px rgba(44,40,37,0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--ink);
      color: var(--bg);
      padding: 16px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .logo {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .logo span { color: var(--accent); }
    .tab-bar {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 3px;
    }
    .tab-btn {
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.8rem;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: white;
    }

    /* ── Main ── */
    main { flex: 1; padding: 20px; max-width: 700px; margin: 0 auto; width: 100%; }

    /* ── Input View ── */
    #input-view { display: flex; flex-direction: column; gap: 16px; }

    .input-label {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.8rem;
      color: var(--ink-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      font-family: 'Lora', serif;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--ink);
      background: var(--surface);
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--ink-muted); font-style: italic; }

    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 15px 24px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary:active { opacity: 0.85; transform: scale(0.98); }

    .sample-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 20px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.88rem;
      color: var(--ink-muted);
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .sample-btn:active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

    /* ── Read View ── */
    #read-view { display: none; flex-direction: column; gap: 16px; }

    .article-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .word-count {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.78rem;
      color: var(--ink-muted);
    }
    .back-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem;
      color: var(--ink-muted);
      cursor: pointer;
    }
    .back-btn:active { background: var(--border); }

    .speed-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
    }
    .speed-label {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem;
      color: var(--ink-muted);
      white-space: nowrap;
    }
    .speed-slider-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }
    .speed-value {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      min-width: 36px;
      text-align: right;
    }
    .custom-slider {
      flex: 1;
      padding: 10px 0;
      cursor: pointer;
      touch-action: none;
    }
    .custom-track {
      position: relative;
      height: 4px;
      background: #e8e2d8;
      border-radius: 2px;
    }
    .custom-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: #c0622f;
      border-radius: 2px;
      width: 56%;
      pointer-events: none;
    }
    .custom-thumb {
      position: absolute;
      top: 50%;
      left: 56%;
      transform: translate(-50%, -50%);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #c0622f;
      box-shadow: 0 2px 8px rgba(192,98,47,0.4);
      pointer-events: none;
    }
    .custom-thumb.dragging { transform: translate(-50%, -50%) scale(1.2); }

    .read-aloud-row {
      display: flex;
      gap: 8px;
    }
    .read-aloud-btn {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 18px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .read-aloud-main { flex: 1; }
    .read-aloud-pause {
      width: 52px;
      flex-shrink: 0;
      font-size: 1.1rem;
    }
    .read-aloud-btn:active { opacity: 0.8; }
    .read-aloud-btn.playing {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
    }
    .read-aloud-btn.paused {
      background: #eef3ff;
      border-color: #7b9cde;
      color: #3a5fa8;
    }
    .read-aloud-btn.playing #read-aloud-icon {
      animation: pulse-speak 0.55s ease-in-out infinite alternate;
      display: inline-block;
    }
    @keyframes icon-pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.2); }
    }

    .hint-bar {
      background: var(--accent-light);
      border: 1px solid #e8c4a8;
      border-radius: 10px;
      padding: 10px 14px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #article-body {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 20px;
      font-size: 1.05rem;
      line-height: 1.85;
      color: var(--ink);
      min-height: 300px;
    }

    .word {
      display: inline;
      cursor: pointer;
      border-radius: 4px;
      padding: 1px 2px;
      transition: background 0.12s, color 0.12s;
      position: relative;
    }
    .word:hover { background: var(--word-hover); }
    .word:active { background: #f8d5b8; transform: scale(0.97); }
    .word.loading { background: var(--accent-light); }
    .word.looked-up {
      background: #fef0e6;
      border-bottom: 2px solid var(--accent);
      border-radius: 4px 4px 2px 2px;
    }
    .word.looked-up:hover { background: #fde3cc; }
    .word.word-read {
      color: #b8a898;
      transition: color 0.2s;
    }
    .word.word-speaking {
      background: #c0622f;
      color: white !important;
      border-radius: 4px;
      padding: 1px 3px;
      box-shadow: 0 2px 8px rgba(192,98,47,0.4);
      transition: background 0.1s, color 0.1s;
    }

    /* ── Vocab List ── */
    #vocab-view { display: none; flex-direction: column; gap: 12px; }

    .vocab-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-muted);
      font-style: italic;
    }
    .vocab-count {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.8rem;
      color: var(--ink-muted);
    }
    .vocab-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .vocab-en {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .vocab-zh {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.9rem;
      color: var(--ink-muted);
    }
    .vocab-del {
      background: none;
      border: none;
      color: var(--border);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .vocab-del:active { background: #fde8e8; color: #c0392b; }

    /* ── Popup ── */
    #popup-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      pointer-events: none;
    }
    #popup-overlay.active { pointer-events: all; }

    #popup {
      position: absolute;
      background: var(--popup-bg);
      color: var(--popup-text);
      border-radius: 16px;
      padding: 0;
      width: min(320px, 88vw);
      box-shadow: var(--shadow);
      transform: scale(0.85) translateY(8px);
      opacity: 0;
      transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      overflow: hidden;
    }
    #popup.show {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    .popup-header {
      background: rgba(255,255,255,0.08);
      padding: 14px 18px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .popup-word {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .popup-close {
      background: rgba(255,255,255,0.12);
      border: none;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .popup-speak-btn {
      background: rgba(255,255,255,0.12);
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
    }
    .popup-speak-btn:active { background: rgba(255,255,255,0.28); transform: scale(0.88); }
    .popup-speak-btn.speaking { animation: pulse-speak 0.55s ease-in-out infinite alternate; }
    @keyframes pulse-speak {
      from { background: rgba(192,98,47,0.35); }
      to   { background: rgba(192,98,47,0.75); }
    }

    .popup-body { padding: 14px 18px; }

    .popup-translation {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 1.05rem;
      color: #f0ece6;
      margin-bottom: 14px;
      min-height: 24px;
    }
    .popup-translation.loading-text::after {
      content: '';
      display: inline-block;
      width: 60px;
      height: 14px;
      background: linear-gradient(90deg, rgba(255,255,255,0.1) 25%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.1) 75%);
      background-size: 200% 100%;
      animation: shimmer 1s infinite;
      border-radius: 4px;
      vertical-align: middle;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .popup-actions {
      display: flex;
      gap: 8px;
    }
    .popup-save-btn {
      flex: 1;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .popup-save-btn:active { opacity: 0.8; }
    .popup-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
      min-height: 0;
    }
    .pos-badge {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
      letter-spacing: 0.03em;
    }
    .pos-noun     { background: rgba(96,165,250,0.2);  color: #93c5fd; }
    .pos-verb     { background: rgba(167,243,208,0.2); color: #6ee7b7; }
    .pos-adj      { background: rgba(253,230,138,0.2); color: #fcd34d; }
    .pos-adv      { background: rgba(216,180,254,0.2); color: #c4b5fd; }
    .pos-prep     { background: rgba(253,186,116,0.2); color: #fdba74; }
    .pos-conj     { background: rgba(249,168,212,0.2); color: #f9a8d4; }
    .pos-pron     { background: rgba(134,239,172,0.2); color: #86efac; }
    .pos-other    { background: rgba(148,163,184,0.2); color: #94a3b8; }
    .popup-phonetic {
      font-family: 'Lora', serif;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 8px;
      font-style: italic;
    }
    .popup-example {
      font-family: 'Lora', serif;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.55);
      font-style: italic;
      line-height: 1.5;
      margin-bottom: 10px;
      border-left: 2px solid rgba(192,98,47,0.5);
      padding-left: 8px;
    }
    .popup-speed-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 8px 12px;
    }
    .popup-speed-adj {
      background: rgba(255,255,255,0.12);
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .popup-speed-adj:active { background: rgba(255,255,255,0.28); }
    .popup-speed-display {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.9rem;
      color: #c0622f;
      font-weight: 600;
      min-width: 40px;
      text-align: center;
    }
    .popup-save-btn.saved {
      background: #4a7c59;
    }



    /* ── Library ── */
    #library-view { display: none; flex-direction: column; gap: 12px; }
    .library-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .review-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 9px 16px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .review-btn:active { opacity: 0.8; }
    .lib-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .lib-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }
    .lib-en {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--ink);
    }
    .lib-phonetic {
      font-family: 'Lora', serif;
      font-size: 0.78rem;
      color: var(--ink-muted);
      font-style: italic;
      margin-top: 2px;
    }
    .lib-zh {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.88rem;
      color: var(--ink-muted);
      margin-bottom: 4px;
    }
    .lib-pos-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 5px; }
    .lib-example {
      font-family: 'Lora', serif;
      font-size: 0.8rem;
      color: var(--ink-muted);
      font-style: italic;
      border-left: 2px solid var(--border);
      padding-left: 8px;
      line-height: 1.5;
    }
    .lib-del {
      background: none;
      border: none;
      color: var(--border);
      font-size: 1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .lib-del:active { background: #fde8e8; color: #c0392b; }

    /* ── Flashcard ── */
    #flashcard-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 400;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }
    .flashcard-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      height: 100%;
    }
    .flashcard-progress {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
    }
    .flashcard-progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s;
      width: 0%;
    }
    .flashcard {
      flex: 1;
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 4px 20px rgba(44,40,37,0.08);
    }
    .fc-front, .fc-back { width: 100%; }
    .fc-word {
      font-size: 2rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .fc-phonetic {
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      color: var(--ink-muted);
      font-style: italic;
      margin-bottom: 16px;
    }
    .fc-tap-hint {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem;
      color: var(--border);
      margin-top: 24px;
    }
    .fc-pos {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .fc-translation {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 16px;
    }
    .fc-example {
      font-family: 'Lora', serif;
      font-size: 0.88rem;
      color: var(--ink-muted);
      font-style: italic;
      line-height: 1.6;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-top: 4px;
    }
    .fc-btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
    }
    .fc-btn {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .fc-btn:active { opacity: 0.8; }
    .fc-wrong { background: #fde8e8; color: #c0392b; }
    .fc-right { background: #e8f5ee; color: #2d7a4f; }
    .lib-io-row {
      display: flex;
      gap: 8px;
    }
    .lib-io-btn {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem;
      color: var(--ink-muted);
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      display: block;
    }
    .lib-io-btn:active { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

    .fc-close {
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 20px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.85rem;
      color: var(--ink-muted);
      cursor: pointer;
    }
    .fc-done {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .fc-done-emoji { font-size: 3rem; }
    .fc-done-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--ink);
    }
    .fc-done-sub {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.9rem;
      color: var(--ink-muted);
    }
    /* ── Reading Progress Bar ── */
    #reading-progress-bar {
      position: sticky;
      top: 53px;
      z-index: 49;
      height: 3px;
      background: var(--border);
    }
    #reading-progress-fill {
      height: 100%;
      background: linear-gradient(to right, var(--accent), #e8854a);
      width: 0%;
      transition: width 0.1s linear;
    }

    /* ── View transition animations ── */
    .view-enter {
      animation: viewIn 0.22s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes viewIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Card hover effects ── */
    .vocab-card {
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    }
    .vocab-card:hover {
      border-color: #d4c8bc;
      box-shadow: 0 4px 16px rgba(44,40,37,0.07);
      transform: translateY(-1px);
    }
    .lib-card {
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    }
    .lib-card:hover {
      border-color: #d4c8bc;
      box-shadow: 0 4px 16px rgba(44,40,37,0.07);
      transform: translateY(-1px);
    }

    /* ── Popup spring upgrade ── */
    #popup.show {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    /* ── Tab active indicator ── */
    .tab-btn {
      position: relative;
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
    }

    /* ── Article word appear animation ── */
    @keyframes wordFadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #article-body {
      animation: wordFadeIn 0.3s ease both;
    }

    /* ── Flashcard flip animation ── */
    .flashcard {
      transition: box-shadow 0.2s;
    }
    .flashcard:hover {
      box-shadow: 0 8px 32px rgba(44,40,37,0.13);
    }
    .flashcard:active {
      transform: scale(0.985);
    }

    /* ── Save btn pulse ── */
    @keyframes savePulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }
    .popup-save-btn.pulse {
      animation: savePulse 0.3s ease;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Word<span>Lens</span></div>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="input">貼文章</button>
    <button class="tab-btn" data-tab="read">閱讀</button>
    <button class="tab-btn" data-tab="vocab">單字本</button>
    <button class="tab-btn" data-tab="library">單字庫</button>
  </div>
</header>
<div id="reading-progress-bar" style="display:none;">
  <div id="reading-progress-fill"></div>
</div>

<main>
  <!-- Input View -->
  <div id="input-view">
    <div class="input-label">貼上英文文章</div>
    <textarea id="article-input" placeholder="Paste your English article here...&#10;&#10;貼上任何英文文章，進入閱讀模式後點單字即可翻譯 👆"></textarea>
    <button class="btn-primary" id="start-btn">
      <span>📖</span> 開始閱讀
    </button>
    <button class="sample-btn" id="sample-btn">使用範例文章試試看</button>
  </div>

  <!-- Read View -->
  <div id="read-view">
    <div class="article-header">
      <button class="back-btn" id="back-btn">← 返回</button>
      <div class="word-count" id="word-count"></div>
    </div>
    <div class="hint-bar">
      <span>👆</span>
      <span>點任何單字查看翻譯</span>
    </div>
    <div class="speed-bar">
      <span class="speed-label">語速</span>
      <div class="speed-slider-wrap">
        <div class="custom-slider" id="speed-slider">
          <div class="custom-track">
            <div class="custom-fill" id="speed-fill"></div>
            <div class="custom-thumb" id="speed-thumb"></div>
          </div>
        </div>
        <span class="speed-value" id="speed-value">0.9x</span>
      </div>
    </div>
    <div class="read-aloud-row" id="read-aloud-row">
      <button class="read-aloud-btn read-aloud-main" id="read-aloud-btn">
        <span id="read-aloud-icon">🔊</span>
        <span id="read-aloud-label">朗讀全文</span>
      </button>
      <button class="read-aloud-btn read-aloud-pause" id="pause-btn" style="display:none;">
        <span id="pause-icon">⏸</span>
      </button>
    </div>
    <div id="article-body"></div>
  </div>

  <!-- Vocab View -->
  <div id="vocab-view">
    <div class="vocab-count" id="vocab-count"></div>
    <div id="vocab-list"></div>
  </div>

  <!-- Library View -->
  <div id="library-view">
    <div class="library-header">
      <div class="vocab-count" id="library-count"></div>
      <button class="review-btn" id="review-btn">🎴 開始複習</button>
    </div>
    <div class="lib-io-row">
      <button class="lib-io-btn" id="export-btn">⬇ 匯出備份</button>
      <label class="lib-io-btn" id="import-label">
        ⬆ 匯入還原
        <input type="file" id="import-input" accept=".json" style="display:none;" />

    <div id="library-list"></div>

    <!-- Flashcard overlay -->
    <div id="flashcard-overlay" style="display:none;">
      <div class="flashcard-wrap">
        <div class="flashcard-progress">
          <div class="flashcard-progress-bar" id="fc-progress-bar"></div>
        </div>
        <div id="flashcard" class="flashcard">
          <div class="fc-front">
            <div class="fc-word" id="fc-word"></div>
            <div class="fc-phonetic" id="fc-phonetic"></div>
            <div class="fc-tap-hint">點擊翻面</div>
          </div>
          <div class="fc-back" id="fc-back" style="display:none;">
            <div class="fc-word" id="fc-word-back"></div>
            <div class="fc-pos" id="fc-pos"></div>
            <div class="fc-translation" id="fc-translation"></div>
            <div class="fc-example" id="fc-example"></div>
          </div>
        </div>
        <div class="fc-btn-row" id="fc-btn-row" style="display:none;">
          <button class="fc-btn fc-wrong" id="fc-wrong">✗ 不熟</button>
          <button class="fc-btn fc-right" id="fc-right">✓ 認識</button>

        <button class="fc-close" id="fc-close">✕ 結束複習</button>
      </div>

</main>

<!-- Popup -->
<div id="popup-overlay">
  <div id="popup">
    <div class="popup-header">
      <div class="popup-word" id="popup-word"></div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="popup-speak-btn" id="popup-speak" title="發音">🔊</button>
        <button class="popup-close" id="popup-close">✕</button>
      </div>
    </div>
    <div class="popup-body">
      <div class="popup-meta" id="popup-meta"></div>
      <div class="popup-translation" id="popup-translation"></div>
      <div class="popup-phonetic" id="popup-phonetic"></div>
      <div class="popup-example" id="popup-example"></div>
      <div class="popup-speed-row">
        <button class="popup-speed-adj" id="popup-speed-down">－</button>
        <span class="popup-speed-display" id="popup-speed-display">0.9x</span>
        <button class="popup-speed-adj" id="popup-speed-up">＋</button>
      </div>
      <div class="popup-actions">
        <button class="popup-save-btn" id="popup-save">＋ 加入單字本</button>
        <button class="popup-save-btn" id="popup-lib-save" style="background:#4a7c59;">＋ 單字庫</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ── State ──
  let vocab = JSON.parse(localStorage.getItem('wordlens-vocab') || '[]');
  let currentWord = '';
  let currentTranslation = '';
  let currentWordEl = null;
  let translationCache = {};

  const SAMPLE = `The ancient forests of the Pacific Northwest are among the most biodiverse ecosystems on Earth. Towering Douglas firs and Sitka spruces create a dense canopy that filters sunlight, casting the forest floor in a perpetual, emerald twilight. Beneath this canopy, an intricate web of life thrives — from delicate mosses clinging to every surface, to the complex fungal networks that connect the roots of trees across vast distances.

Scientists have discovered that trees communicate through these underground networks, sharing nutrients and even warning signals when pests or disease threaten. This remarkable phenomenon has transformed how we understand forests: not as collections of individual trees competing for resources, but as collaborative communities with a sophisticated, silent language of their own.`;

  // ── Tabs ──
  const tabs = document.querySelectorAll('.tab-btn');
  const views = { input: document.getElementById('input-view'), read: document.getElementById('read-view'), vocab: document.getElementById('vocab-view'), library: document.getElementById('library-view') };

  function switchTab(tab) {
    tabs.forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    Object.entries(views).forEach(([k, v]) => {
      const showing = k === tab;
      v.style.display = showing ? 'flex' : 'none';
      if (showing) {
        v.classList.remove('view-enter');
        void v.offsetWidth; // reflow
        v.classList.add('view-enter');
      }
    });
    progressBar.style.display = tab === 'read' ? 'block' : 'none';
    if (tab === 'vocab') renderVocab();
    if (tab === 'library') renderLibrary();
    if (tab === 'read') { updateProgress(); }
  }

  tabs.forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));

  // ── Sample ──
  document.getElementById('sample-btn').addEventListener('click', () => {
    document.getElementById('article-input').value = SAMPLE;
  });

  // ── Start reading ──
  document.getElementById('start-btn').addEventListener('click', () => {
    const text = document.getElementById('article-input').value.trim();
    if (!text) { alert('請先貼上文章！'); return; }
    renderArticle(text);
    switchTab('read');
  });

  document.getElementById('back-btn').addEventListener('click', () => {
    stopReadAloud();
    isPaused = false;
    switchTab('input');
  });

  // ── Render article with clickable words ──
  function renderArticle(text) {
    const body = document.getElementById('article-body');
    const words = text.split(/(\s+|[\n\r]+)/);
    let wordCount = 0;
    let html = '';
    let charPos = 0;

    words.forEach(part => {
      if (/\n/.test(part)) {
        html += '<br><br>';
        charPos += part.length;
      } else if (/\s+/.test(part)) {
        html += ' ';
        charPos += part.length;
      } else if (part) {
        const clean = part.replace(/[^a-zA-Z'-]/g, '');
        const prefix = part.match(/^[^a-zA-Z'-]*/)?.[0] || '';
        const suffix = part.match(/[^a-zA-Z'-]*$/)?.[0] || '';
        if (clean) {
          wordCount++;
          const wordStart = charPos + prefix.length;
          const isLooked = vocab.some(v => v.en.toLowerCase() === clean.toLowerCase());
          html += `${prefix}<span class="word${isLooked ? ' looked-up' : ''}" data-word="${clean}" data-start="${wordStart}">${clean}</span>${suffix}`;
        } else {
          html += part;
        }
        charPos += part.length;
      }
    });

    body.innerHTML = html;
    document.getElementById('word-count').textContent = `${wordCount} 個單字`;

    body.querySelectorAll('.word').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        showPopup(el.dataset.word, el);
      });
    });
  }

  // ── Translation ──
  async function translate(word) {
    const key = word.toLowerCase();
    if (translationCache[key]) return translationCache[key];
    try {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q=${encodeURIComponent(word)}`;
      const res = await fetch(url);
      const data = await res.json();
      const result = data?.[0]?.[0]?.[0] || '（翻譯失敗）';
      translationCache[key] = result;
      return result;
    } catch {
      // Fallback to MyMemory
      try {
        const res2 = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|zh-TW`);
        const data2 = await res2.json();
        const result2 = data2?.responseData?.translatedText || '（翻譯失敗）';
        translationCache[key] = result2;
        return result2;
      } catch {
        return '❌ 請確認網路連線';
      }
    }
  }

  // ── Dictionary ──
  let dictCache = {};
  const POS_MAP = {
    'noun': ['noun','名詞','pos-noun'],
    'verb': ['verb','動詞','pos-verb'],
    'adjective': ['adj','形容詞','pos-adj'],
    'adverb': ['adv','副詞','pos-adv'],
    'preposition': ['prep','介係詞','pos-prep'],
    'conjunction': ['conj','連接詞','pos-conj'],
    'pronoun': ['pron','代名詞','pos-pron'],
    'article': ['art','冠詞','pos-other'],
    'exclamation': ['excl','感嘆詞','pos-other'],
  };

  async function fetchDictionary(word) {
    const key = word.toLowerCase();
    if (dictCache[key]) return dictCache[key];
    try {
      const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(key)}`);
      if (!res.ok) { dictCache[key] = null; return null; }
      const data = await res.json();
      const entry = data[0];
      const phonetic = entry.phonetic || entry.phonetics?.find(p => p.text)?.text || '';
      const meanings = entry.meanings || [];
      const result = { phonetic, meanings: [] };
      meanings.forEach(m => {
        const posKey = Object.keys(POS_MAP).find(k => m.partOfSpeech?.toLowerCase().includes(k));
        const [short, zh, cls] = posKey ? POS_MAP[posKey] : ['?','?','pos-other'];
        const def = m.definitions?.[0];
        const example = def?.example || '';
        result.meanings.push({ pos: m.partOfSpeech, short, zh, cls, example });
      });
      dictCache[key] = result;
      return result;
    } catch {
      dictCache[key] = null;
      return null;
    }
  }

  // ── Popup ──
  const popup = document.getElementById('popup');
  const overlay = document.getElementById('popup-overlay');

  function showPopup(word, el) {
    currentWord = word;
    currentWordEl = el;
    currentTranslation = '';

    document.getElementById('popup-word').textContent = word;
    const transEl = document.getElementById('popup-translation');
    transEl.textContent = '';
    transEl.classList.add('loading-text');
    document.getElementById('popup-meta').innerHTML = '';
    document.getElementById('popup-phonetic').textContent = '';
    document.getElementById('popup-example').textContent = '';

    const saveBtn = document.getElementById('popup-save');
    const alreadySaved = vocab.some(v => v.en.toLowerCase() === word.toLowerCase());
    saveBtn.textContent = alreadySaved ? '✓ 已在單字本' : '＋ 加入單字本';
    saveBtn.classList.toggle('saved', alreadySaved);
    const libBtn = document.getElementById('popup-lib-save');
    const inLib = library.some(v => v.en.toLowerCase() === word.toLowerCase());
    libBtn.textContent = inLib ? '✓ 已在單字庫' : '＋ 單字庫';
    libBtn.style.opacity = inLib ? '0.7' : '1';

    // Position popup
    const rect = el.getBoundingClientRect();
    const popupEl = popup;
    const margin = 12;
    const popupW = Math.min(320, window.innerWidth * 0.88);
    const popupH = 160;

    let top = rect.bottom + margin;
    let left = rect.left;
    if (left + popupW > window.innerWidth - margin) left = window.innerWidth - popupW - margin;
    if (left < margin) left = margin;
    if (top + popupH > window.innerHeight - margin) top = rect.top - popupH - margin;

    popupEl.style.top = top + 'px';
    popupEl.style.left = left + 'px';
    popupEl.style.width = popupW + 'px';

    popup.classList.add('show');
    syncPopupSpeed();
    overlay.classList.add('active');

    Promise.all([translate(word), fetchDictionary(word)]).then(([translation, dict]) => {
      currentTranslation = translation;
      transEl.classList.remove('loading-text');
      transEl.textContent = translation;

      if (dict) {
        // Phonetic
        if (dict.phonetic) {
          document.getElementById('popup-phonetic').textContent = dict.phonetic;
        }
        // Part of speech badges
        const metaEl = document.getElementById('popup-meta');
        const seen = new Set();
        dict.meanings.forEach(m => {
          if (!seen.has(m.short)) {
            seen.add(m.short);
            const badge = document.createElement('span');
            badge.className = 'pos-badge ' + m.cls;
            badge.textContent = m.short + ' ' + m.zh;
            metaEl.appendChild(badge);
          }
        });
        // Example - prefer preposition/verb, else first available
        const priority = ['preposition','verb','noun','adjective'];
        let bestExample = '';
        for (const p of priority) {
          const m = dict.meanings.find(m => m.pos?.includes(p) && m.example);
          if (m) { bestExample = m.example; break; }
        }
        if (!bestExample) {
          const m = dict.meanings.find(m => m.example);
          if (m) bestExample = m.example;
        }
        if (bestExample) {
          document.getElementById('popup-example').textContent = '"' + bestExample + '"';
        }
      }
    });
  }

  function hidePopup() {
    popup.classList.remove('show');
    overlay.classList.remove('active');
  }

  overlay.addEventListener('click', hidePopup);
  document.getElementById('popup-close').addEventListener('click', (e) => { e.stopPropagation(); hidePopup(); });
  document.getElementById('popup').addEventListener('click', (e) => e.stopPropagation());

  // ── Speech Rate ──
  var speechRate = 0.9;
  var isReadingAloud = false;
  var isRestarting = false;
  var articleText = '';
  var currentCharIndex = 0;
  const sliderEl   = document.getElementById('speed-slider');
  const fillEl     = document.getElementById('speed-fill');
  const thumbEl    = document.getElementById('speed-thumb');
  const speedLabel = document.getElementById('speed-value');
  const MIN = 0.1, MAX = 1.5, STEP = 0.1;

  function setRate(pct) {
    pct = Math.max(0, Math.min(1, pct));
    const raw = MIN + pct * (MAX - MIN);
    speechRate = Math.round(raw / STEP) * STEP;
    speechRate = Math.round(speechRate * 10) / 10;
    const dp = (speechRate - MIN) / (MAX - MIN) * 100;
    fillEl.style.width = dp + '%';
    thumbEl.style.left = dp + '%';
    speedLabel.textContent = speechRate.toFixed(1) + 'x';
    // 朗讀中：取消後從目前位置以新語速重新開始
    if (isReadingAloud && !isPaused) {
      startSpeakingFrom(currentCharIndex);
    }
  }

  function pctFromEvent(e) {
    const rect = sliderEl.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return (clientX - rect.left) / rect.width;
  }

  sliderEl.addEventListener('touchstart', (e) => {
    e.preventDefault();
    thumbEl.classList.add('dragging');
    setRate(pctFromEvent(e));
  }, { passive: false });

  sliderEl.addEventListener('touchmove', (e) => {
    e.preventDefault();
    setRate(pctFromEvent(e));
  }, { passive: false });

  sliderEl.addEventListener('touchend', () => thumbEl.classList.remove('dragging'));

  sliderEl.addEventListener('mousedown', (e) => {
    thumbEl.classList.add('dragging');
    setRate(pctFromEvent(e));
    const onMove = (e) => setRate(pctFromEvent(e));
    const onUp = () => {
      thumbEl.classList.remove('dragging');
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });

  setRate((0.9 - MIN) / (MAX - MIN));

  // ── Read Aloud ──

  // ── Word Highlight Helpers ──
  function clearHighlights() {
    document.querySelectorAll('.word-speaking, .word-read').forEach(el => {
      el.classList.remove('word-speaking', 'word-read');
    });
  }

  function highlightAt(absCharIndex) {
    const allWords = Array.from(document.querySelectorAll('#article-body .word[data-start]'));
    if (!allWords.length) return;

    let speakingEl = null;
    let minDiff = Infinity;
    allWords.forEach(el => {
      const start = parseInt(el.dataset.start);
      const diff = Math.abs(start - absCharIndex);
      if (diff < minDiff) { minDiff = diff; speakingEl = el; }
    });

    allWords.forEach(el => {
      el.classList.remove('word-speaking');
      const start = parseInt(el.dataset.start);
      if (speakingEl && start < parseInt(speakingEl.dataset.start)) {
        el.classList.add('word-read');
      } else {
        el.classList.remove('word-read');
      }
    });
    if (speakingEl) {
      speakingEl.classList.add('word-speaking');
      speakingEl.classList.remove('word-read');
      // Auto-scroll into view smoothly
      speakingEl.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'nearest' });
    }
  }

  function startSpeakingFrom(charIndex) {
    isRestarting = true;
    window.speechSynthesis.cancel();
    const textToSpeak = articleText.slice(charIndex);
    if (!textToSpeak.trim()) { isRestarting = false; stopReadAloud(); return; }
    const utter = new SpeechSynthesisUtterance(textToSpeak);
    utter.lang = 'en-US';
    utter.rate = speechRate;
    utter.onboundary = (e) => {
      if (e.name === 'word') {
        currentCharIndex = charIndex + e.charIndex;
        highlightAt(currentCharIndex);
      }
    };
    utter.onend = () => {
      if (!isRestarting && isReadingAloud) stopReadAloud();
    };
    utter.onerror = (e) => {
      if (!isRestarting && e.error !== 'interrupted' && isReadingAloud) stopReadAloud();
    };
    setTimeout(() => { isRestarting = false; window.speechSynthesis.speak(utter); }, 80);
  }

  var isPaused = false;

  function setReadAloudUI(state) {
    // state: 'stopped' | 'playing' | 'paused'
    const mainBtn  = document.getElementById('read-aloud-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const icon     = document.getElementById('read-aloud-icon');
    const label    = document.getElementById('read-aloud-label');
    const pauseIcon = document.getElementById('pause-icon');
    mainBtn.classList.remove('playing', 'paused');
    pauseBtn.style.display = 'none';
    if (state === 'playing') {
      mainBtn.classList.add('playing');
      icon.textContent = '⏹';
      label.textContent = '停止朗讀';
      pauseBtn.style.display = 'flex';
      pauseBtn.classList.remove('paused');
      pauseBtn.classList.add('playing');
      pauseIcon.textContent = '⏸';
    } else if (state === 'paused') {
      mainBtn.classList.add('paused');
      icon.textContent = '▶';
      label.textContent = '繼續朗讀';
      pauseBtn.style.display = 'flex';
      pauseBtn.classList.remove('playing');
      pauseBtn.classList.add('paused');
      pauseIcon.textContent = '⏹';
    } else {
      icon.textContent = '🔊';
      label.textContent = '朗讀全文';
    }
  }

  function stopReadAloud() {
    window.speechSynthesis.cancel();
    isReadingAloud = false;
    isPaused = false;
    currentCharIndex = 0;
    clearHighlights();
    setReadAloudUI('stopped');
  }

  function pauseReadAloud() {
    if (!isReadingAloud || isPaused) return;
    window.speechSynthesis.cancel();
    isPaused = true;
    isReadingAloud = false;
    // keep currentCharIndex at last word boundary
    setReadAloudUI('paused');
  }

  function resumeReadAloud() {
    if (!isPaused) return;
    isPaused = false;
    isReadingAloud = true;
    setReadAloudUI('playing');
    startSpeakingFrom(currentCharIndex);
  }

  document.getElementById('read-aloud-btn').addEventListener('click', () => {
    if (!window.speechSynthesis) { alert('你的瀏覽器不支援語音功能'); return; }
    if (isPaused) { resumeReadAloud(); return; }
    if (isReadingAloud) { stopReadAloud(); return; }
    articleText = document.getElementById('article-body').innerText;
    if (!articleText.trim()) return;
    isReadingAloud = true;
    isPaused = false;
    currentCharIndex = 0;
    setReadAloudUI('playing');
    startSpeakingFrom(0);
  });

  // pause btn: when playing → pause; when paused → stop
  document.getElementById('pause-btn').addEventListener('click', () => {
    if (isReadingAloud) { pauseReadAloud(); }
    else if (isPaused) { stopReadAloud(); }
  });

  // ── Speak single word ──
  function speak(word) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(word);
    utter.lang = 'en-US';
    utter.rate = speechRate;
    const speakBtn = document.getElementById('popup-speak');
    speakBtn.classList.add('speaking');
    utter.onend = () => speakBtn.classList.remove('speaking');
    utter.onerror = () => speakBtn.classList.remove('speaking');
    // iOS Safari needs a tiny delay after cancel()
    setTimeout(() => window.speechSynthesis.speak(utter), 50);
  }

  // ── Popup speed controls ──
  function syncPopupSpeed() {
    const el = document.getElementById('popup-speed-display');
    if (el) el.textContent = speechRate.toFixed(1) + 'x';
    // Also sync main slider
    const pct = (speechRate - MIN) / (MAX - MIN);
    const dp = pct * 100;
    if (fillEl) fillEl.style.width = dp + '%';
    if (thumbEl) thumbEl.style.left = dp + '%';
    if (speedLabel) speedLabel.textContent = speechRate.toFixed(1) + 'x';
  }

  document.getElementById('popup-speed-down').addEventListener('click', (e) => {
    e.stopPropagation();
    speechRate = Math.max(0.1, Math.round((speechRate - 0.1) * 10) / 10);
    syncPopupSpeed();
    if (isReadingAloud) startSpeakingFrom(currentCharIndex);
  });

  document.getElementById('popup-speed-up').addEventListener('click', (e) => {
    e.stopPropagation();
    speechRate = Math.min(1.5, Math.round((speechRate + 0.1) * 10) / 10);
    syncPopupSpeed();
    if (isReadingAloud) startSpeakingFrom(currentCharIndex);
  });

  document.getElementById('popup-speak').addEventListener('click', (e) => {
    e.stopPropagation(); // 防止冒泡觸發 backdrop 關閉
    speak(currentWord);
  });

  // ── Save to library ──
  document.getElementById('popup-lib-save').addEventListener('click', (e) => {
    e.stopPropagation();
    if (!currentTranslation) return;
    const dict = dictCache[currentWord.toLowerCase()];
    const added = saveToLibrary(currentWord, currentTranslation, dict);
    const btn = document.getElementById('popup-lib-save');
    btn.textContent = added ? '✓ 已存入單字庫' : '✓ 已在單字庫';
    btn.style.opacity = '0.7';
  });

  // ── Save to vocab ──
  document.getElementById('popup-save').addEventListener('click', () => {
    if (!currentTranslation) return;
    const key = currentWord.toLowerCase();
    const alreadySaved = vocab.some(v => v.en.toLowerCase() === key);
    if (!alreadySaved) {
      vocab.unshift({ en: currentWord, zh: currentTranslation });
      localStorage.setItem('wordlens-vocab', JSON.stringify(vocab));
      // Mark word in article
      document.querySelectorAll(`.word[data-word="${currentWord}"]`).forEach(el => el.classList.add('looked-up'));
    }
    const saveBtn = document.getElementById('popup-save');
    saveBtn.textContent = '✓ 已在單字本';
    saveBtn.classList.add('saved', 'pulse');
    setTimeout(() => saveBtn.classList.remove('pulse'), 400);
  });

  // ── Vocab ──
  function renderVocab() {
    const list = document.getElementById('vocab-list');
    const count = document.getElementById('vocab-count');
    if (vocab.length === 0) {
      count.textContent = '';
      list.innerHTML = '<div class="vocab-empty">單字本是空的<br>閱讀時點單字並儲存 📚</div>';
      return;
    }
    count.textContent = `已收錄 ${vocab.length} 個單字`;
    list.innerHTML = vocab.map((v, i) => `
      <div class="vocab-card">
        <div>
          <div class="vocab-en">${v.en}</div>
          <div class="vocab-zh">${v.zh}</div>
        </div>
        <button class="vocab-del" data-index="${i}">✕</button>
      </div>
    `).join('');
    list.querySelectorAll('.vocab-del').forEach(btn => {
      btn.addEventListener('click', () => {
        vocab.splice(parseInt(btn.dataset.index), 1);
        localStorage.setItem('wordlens-vocab', JSON.stringify(vocab));
        renderVocab();
      });
    });
  }

  // ── Library (永久單字庫) ──
  var library = JSON.parse(localStorage.getItem('wordlens-library') || '[]');

  function saveToLibrary(word, translation, dict) {
    if (library.some(w => w.en.toLowerCase() === word.toLowerCase())) return false;
    const entry = { en: word, zh: translation, phonetic: '', posList: [], example: '' };
    if (dict) {
      entry.phonetic = dict.phonetic || '';
      const seen = new Set();
      dict.meanings.forEach(m => {
        if (!seen.has(m.short)) { seen.add(m.short); entry.posList.push({ short: m.short, zh: m.zh, cls: m.cls }); }
      });
      const priority = ['preposition','verb','noun','adjective'];
      for (const p of priority) {
        const m = dict.meanings.find(m => m.pos?.includes(p) && m.example);
        if (m) { entry.example = m.example; break; }
      }
      if (!entry.example) {
        const m = dict.meanings.find(m => m.example);
        if (m) entry.example = m.example;
      }
    }
    library.unshift(entry);
    localStorage.setItem('wordlens-library', JSON.stringify(library));
    return true;
  }

  function renderLibrary() {
    const list = document.getElementById('library-list');
    const count = document.getElementById('library-count');
    if (library.length === 0) {
      count.textContent = '';
      list.innerHTML = '<div class="vocab-empty">單字庫是空的<br>從單字本中加入單字 📚</div>';
      return;
    }
    count.textContent = `單字庫共 ${library.length} 個單字`;
    list.innerHTML = library.map((w, i) => `
      <div class="lib-card">
        <div class="lib-card-top">
          <div>
            <div class="lib-en">${w.en}</div>
            ${w.phonetic ? `<div class="lib-phonetic">${w.phonetic}</div>` : ''}
          </div>
          <button class="lib-del" data-index="${i}">✕</button>
        </div>
        ${w.posList?.length ? `<div class="lib-pos-row">${w.posList.map(p => `<span class="pos-badge ${p.cls}">${p.short} ${p.zh}</span>`).join('')}</div>` : ''}
        <div class="lib-zh">${w.zh}</div>
        ${w.example ? `<div class="lib-example">"${w.example}"</div>` : ''}
      </div>
    `).join('');
    list.querySelectorAll('.lib-del').forEach(btn => {
      btn.addEventListener('click', () => {
        library.splice(parseInt(btn.dataset.index), 1);
        localStorage.setItem('wordlens-library', JSON.stringify(library));
        renderLibrary();
      });
    });
  }

  // ── Flashcard ──
  let fcQueue = [], fcIndex = 0, fcFlipped = false, fcWrong = [];

  function startReview() {
    if (library.length === 0) return;
    fcQueue = [...library].sort(() => Math.random() - 0.5);
    fcWrong = [];
    fcIndex = 0;
    fcFlipped = false;
    document.getElementById('flashcard-overlay').style.display = 'flex';
    showCard();
  }

  function showCard() {
    const w = fcQueue[fcIndex];
    if (!w) { showDone(); return; }
    fcFlipped = false;
    document.getElementById('fc-word').textContent = w.en;
    document.getElementById('fc-phonetic').textContent = w.phonetic || '';
    document.getElementById('fc-back').style.display = 'none';
    document.querySelector('.fc-front').style.display = 'block';
    document.getElementById('fc-btn-row').style.display = 'none';
    document.getElementById('fc-word-back').textContent = w.en;
    document.getElementById('fc-translation').textContent = w.zh;
    document.getElementById('fc-pos').innerHTML = (w.posList || []).map(p => `<span class="pos-badge ${p.cls}">${p.short} ${p.zh}</span>`).join('');
    document.getElementById('fc-example').textContent = w.example ? `"${w.example}"` : '';
    const pct = (fcIndex / fcQueue.length * 100).toFixed(0);
    document.getElementById('fc-progress-bar').style.width = pct + '%';
  }

  function showDone() {
    const card = document.getElementById('flashcard');
    card.style.cursor = 'default';
    card.innerHTML = `<div class="fc-done">
      <div class="fc-done-emoji">🎉</div>
      <div class="fc-done-title">複習完成！</div>
      <div class="fc-done-sub">共 ${fcQueue.length} 個單字，${fcWrong.length} 個需要加強</div>
      ${fcWrong.length ? `<button class="review-btn" id="retry-btn">重複練習不熟的</button>` : ''}
    </div>`;
    document.getElementById('fc-btn-row').style.display = 'none';
    document.getElementById('fc-progress-bar').style.width = '100%';
    const retry = document.getElementById('retry-btn');
    if (retry) retry.addEventListener('click', () => {
      fcQueue = [...fcWrong].sort(() => Math.random() - 0.5);
      fcWrong = []; fcIndex = 0; fcFlipped = false;
      card.style.cursor = 'pointer';
      card.innerHTML = `<div class="fc-front"><div class="fc-word" id="fc-word"></div><div class="fc-phonetic" id="fc-phonetic"></div><div class="fc-tap-hint">點擊翻面</div></div><div class="fc-back" id="fc-back" style="display:none;"><div class="fc-word" id="fc-word-back"></div><div class="fc-pos" id="fc-pos"></div><div class="fc-translation" id="fc-translation"></div><div class="fc-example" id="fc-example"></div></div>`;
      showCard();
    });
  }

  document.getElementById('flashcard').addEventListener('click', () => {
    if (fcFlipped) return;
    fcFlipped = true;
    document.querySelector('.fc-front').style.display = 'none';
    document.getElementById('fc-back').style.display = 'block';
    document.getElementById('fc-btn-row').style.display = 'flex';
  });

  document.getElementById('fc-wrong').addEventListener('click', () => {
    fcWrong.push(fcQueue[fcIndex]);
    fcIndex++; fcFlipped = false; showCard();
  });
  document.getElementById('fc-right').addEventListener('click', () => {
    fcIndex++; fcFlipped = false; showCard();
  });
  document.getElementById('review-btn').addEventListener('click', startReview);
  document.getElementById('fc-close').addEventListener('click', () => {
    document.getElementById('flashcard-overlay').style.display = 'none';
  });

  // ── Export / Import ──
  document.getElementById('export-btn').addEventListener('click', () => {
    const data = {
      version: 1,
      exportedAt: new Date().toISOString(),
      library: library,
      vocab: vocab
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'wordlens-backup-' + new Date().toLocaleDateString('zh-TW').replace(/\//g, '-') + '.json';
    a.click();
    URL.revokeObjectURL(url);
  });

  document.getElementById('import-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.library && !data.vocab) throw new Error('格式錯誤');
        let added = 0;
        if (data.library) {
          data.library.forEach(w => {
            if (!library.some(v => v.en.toLowerCase() === w.en.toLowerCase())) {
              library.push(w);
              added++;
            }
          });
          localStorage.setItem('wordlens-library', JSON.stringify(library));
        }
        if (data.vocab) {
          data.vocab.forEach(w => {
            if (!vocab.some(v => v.en.toLowerCase() === w.en.toLowerCase())) {
              vocab.push(w);
            }
          });
          localStorage.setItem('wordlens-vocab', JSON.stringify(vocab));
        }
        renderLibrary();
        alert(`✅ 匯入成功！新增了 ${added} 個單字`);
      } catch {
        alert('❌ 檔案格式錯誤，請選擇正確的備份檔');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // ── Reading Progress Bar ──
  const progressBar = document.getElementById('reading-progress-bar');
  const progressFill = document.getElementById('reading-progress-fill');

  function updateProgress() {
    const body = document.getElementById('article-body');
    if (!body || views.read.style.display === 'none') return;
    const rect = body.getBoundingClientRect();
    const total = body.offsetHeight;
    const scrolled = Math.max(0, -rect.top + window.innerHeight * 0.3);
    const pct = Math.min(100, (scrolled / total) * 100);
    progressFill.style.width = pct.toFixed(1) + '%';
  }

  window.addEventListener('scroll', updateProgress, { passive: true });

  // Show/hide progress bar with tab
  const origSwitch = switchTab;

  // ── PWA Service Worker ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>
</body>
</html>
